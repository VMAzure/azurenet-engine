    BasePayloadShared:
      type: object
      properties:
        additionalFuelTypes:
          type: array
          description: |
            Additional supported fuel types that might accompany the primary fuel type.
            These fuel types can also be consumed by the vehicle but have higher emissions than the primary fuel type.
            This is derived from German emission/consumption regulations for vehicles (EnVKV).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Optional for vehicleType  <code>C</code> (Car), <code>X</code> (light commercial vehicle), <code>B</code> (bikes), <code>N</code> (caravan/mobile home)

          uniqueItems: true
          example: [ 2, 3 ]
          items:
            type: integer
            description: |
              Each of the fuel type identifiers. Allowed values can be retrieved via the references API
              (reference type FuelType)
        alloyWheelSize:
          type: integer
          minimum: 10
          maximum: 26
          description: |
            Size of alloy wheels of the vehicle (in inches).

            > This property can only be specified if the equipment <code>15 "Alloy Wheels"</code> is set in the equipment property.

          example: 18
        axleCount:
          type: integer
          description: |
            The number of axles the vehicle has.

            > Forbidden for vehicleType <code>C</code> (car) and <code>B</code> (bike)

          minimum: 1
          maximum: 6
          example: 1
        bedCount:
          type: integer
          description: |
            Total number of beds.

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike), <code>X</code> (light commercial vehicle) and <code>L</code> (trailer)

          minimum: 0
          maximum: 9
          example: 4
        belgianCarpassMileageUrl:
          type: string
          format: url
          description: |
            The URL for the Carpass technical inspection for the listed vehicle

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: "https://public.car-pass.be/vhr/2a0f0719-1b7a-4e42-84e1-c5c746ab1c39"
        bodyColor:
          type: integer
          description: |
            Basic body color of the vehicle.
            > Allowed values can be retrieved via the references API (reference type BodyColor).
          example: 2
        bodyColorName:
          type: string
          minLength: 1
          maxLength: 30
          description: |
            Manufacturers name of body color.

            > Emails are forbidden in the content


            > Forbidden characters are<code>&lt;</code> or <code>&gt;</code>


            >  Strings longer than 30 characters are accepted by the API but will be truncated to 30 characters.

          example: British Racing Green
        bodyType:
          type: integer
          description: |
            Shape of vehicle’s body.

            > Allowed values can be retrieved via the references API (reference type BodyType)
            
            > Valid values for this reference type are dependent on the marketplace country of the customers.
            
            > Mandatory for all listings

          example: 1
        countryVersion:
          type: string
          description: |
            Indicates the original market/country the vehicle was built for.

            > Allowed values can be retrieved via the references API (reference type Country)

          example: AT
        co2Emissions:
          type: integer
          description: |
            Vehicle’s carbon dioxide emission in g/km.
            
            > *Deprecated, use <code>wltp.co2EmissionsCombined</code> or <code>wltp.co2EmissionsCombinedWeighted</code> instead*

            > Mandatory and not smaller than 1 for German dealers when the car is considered new (<code>mileage</code> <= 1000)

            > Forbidden for vehicleType <code>L</code> (trailer)
          example: 23
        consumption:
          description: |
            Provides fuel and electric consumption information for the vehicle.

            > *Deprecated, use <code>wltp.consumptionCombined</code> or <code>wltp.consumptionCombinedWeighted</code> instead*

            > Forbidden for vehicleType <code>L</code> (trailer)

          allOf:
            - $ref: '#/components/schemas/Consumption'
        cylinderCapacity:
          type: integer
          minimum: 1
          maximum: 99999
          description: |
            Volume of the engines cylinders in cubic centimeters.

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: 1998
        cylinderCount:
          type: integer
          minimum: 1
          maximum: 99
          description: |
            The number of cylinders of the engine.

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: 4
        description:
          type: string
          maxLength: 10000
          description: |
            Free text description of the vehicle.

            > Text may be formatted by tags. The following tags are supported:


            > Line break: <code>\n</code> equivalent to HTML's <code>&lt;br&gt;</code>.


            > Horizontal line: <code>----</code>  equivalent to HTML's <code>&lt;hr&gt;</code> and always accompanied by an automatic line break.


            > Bold: <code>**lorem ipsum**</code> equivalent to HTML's <code>&lt;b&gt;lorem ipsum&lt;/b&gt;</code>


            > Bulleted list: <code>\\\\* lorem \\\\* ipsum</code>


            > Note that the first 10000 characters are displayed. Generally 1 character is equal to 1 byte but characters from the extended alphabet like “ä” count as 2 bytes.

          example: |
            This car is **great**. ---- It has the following features: \n \\\\* Low price \\\\* Great interior
        doorCount:
          type: integer
          minimum: 1
          maximum: 9
          description: |
            Number of doors the vehicle has

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: 5
        drivetrain:
          type: string
          description: |
            Drive type of the vehicle.

            > Allowed values can be retrieved via the references API (reference type DriveType)


            > Forbidden for vehicleType <code>B</code> (bike) and <code>L</code> (trailer)

          example: R
        efficiencyClass:
          type: integer
          description: |
            Vehicle’s energy efficiency class.

            > *Deprecated, use <code>wltp.co2Class</code> instead*

            > Allowed values can be retrieved via the references API (reference type EfficiencyClass)

            > Mandatory for German dealers when vehicleType is <code>C</code> and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>B</code> (bike) and <code>L</code> (trailer)

          example: 2
        electricRange:
          type: integer
          minimum: 1
          maximum: 10000
          example: 620
          description: |
            The electric range of the vehicle in kilometers according to WLTP. (EAER)

            > Mandatory for German dealers when the consumption values are WLTP and the vehicle type is <code>C</code> (Car), <code>primaryFuelType</code> is <code>12</code> (electric / PHEV / EV) and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).
        electricRangeCity:
          type: integer
          minimum: 1
          maximum: 10000
          example: 410
          description: |
            The electric range of the vehicle in kilometers according to WLTP measured in cities. (EAER city)
        emptyWeight:
          type: integer
          minimum: 1
          maximum: 99999
          description: Vehicle’s weight without driver, passengers or liquids (like fuel) in kg.
          example: 1200
        equipment:
          type: array
          description: |
            List of vehicle’s equipment.

            > Allowed values can be retrieved via the references API (reference type equipment)

            > You are only allowed to send one Automatic Climate Control equipment for a given listing. Automatic climate control equipments include: (241) Automatic climate control 2 zones, (242) Automatic climate control 3 zones, (243) Automatic climate control, 4 zones and (30) Automatic climate control. If the vehicle has Automatic Climate Control but the number of zones is unknown, use (30) Automatic climate control.

            > If the vehicle has a sliding door, but the side which the door is on is unknown use equipment (152) Sliding Door. If the side is known use (244) Sliding Door left, (245) Sliding Door right or both (if there are sliding doors on both sides). You are not allowed to send (152) sliding door, and (244)/(245) at the same time.

          example: [ 1, 2, 4, 15 ]
          uniqueItems: true
          items:
            type: integer
            description: |
              An equipment ID.
        euEmissionStandard:
          type: string
          description: |
            The EU emission standard indicates the amount of harmful substances the vehicle emits.
            The classification is in accordance with the European Standard Euronorm

            > Allowed values can be retrieved via the references API (reference type EuEmissionStandard)


            > Forbidden for vehicleType <code>L</code> (trailer)

          example: "1"
        externalCustomerId:
          type: string
          description: A customer id belonging to an external system.
          example: '1'
        firstRegistrationDate:
          type: string
          format: year-month
          description: |
            Month and year of first registration of the vehicle.

            > Mandatory for vehicleType <code>C</code> (car), <code>B</code> (Bike), <code>X</code> (light commercial vehicle) where offerType is  <code>J</code> (employee’s car), <code>O</code> (antique/classic), <code>S</code> (pre-registered), <code>U</code> (used)


            > Must not be more than 24 months in the past  when vehicleType is <code>C</code> (car) and offerType = <code>J</code> (employee’s car)


            > Must not be more than 12 months in the past when vehicleType is <code>C</code> (car) and OfferType = <code>S</code> (pre-registered).  This rule does not apply to Italian dealers


            > Must be greater than 360 months (30 years) when vehicleType is <code>C</code> (car) and offerType is <code>O</code> (antique/classic)


            > Must not be a date from the future set when OfferType = <code>J</code> (annual car) or OfferType = <code>O</code> (old timer).

            > Note: Must not be less than <code>1886</code>

          example: 2015-01
        fuelCategory:
          type: string
          description: |
            Category of fuel/energy source for the vehicle.

            > Allowed values can be retrieved via the references API (reference type FuelCategory)
            
            > Valid values for this reference type are dependent on the marketplace country of the customers.

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: B
        gearCount:
          type: integer
          minimum: 1
          maximum: 99
          description: |
            Number of gears of the vehicle

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: 6
        germanEmissionsSticker:
          type: integer
          description: |
            Emissions sticker type as assigned by German technical inspection authorities (Umweltplakette/Feinstaubplakette).

            > Allowed values can be retrieved via the references API (reference type EmissionsSticker)


            > Forbidden for vehicleType <code>B</code> (bike) and <code>L</code> (trailer)

          example: 1
        hasCarRegistration:
          type: boolean
          description: |
            Indicates whether a vehicle is registered as a car in the registration documents

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike) and <code>L</code> (trailer)

          example: false
        hasFullServiceHistory:
          type: boolean
          description: |
            Indicates whether vehicle has passed all periodic maintenance as recommended by the vehicle manufacturer.
          example: false
        hasParticleFilter:
          type: boolean
          description: |
            Indicates whether a diesel vehicle is equipped with a particle filter

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: true
        hsn:
          type: string
          minLength: 4
          maxLength: 4
          description: |
            Herstellerschluesselnummer, or the unique identifier of vehicle manufacturer in Germany.
            In combination with TSN this key is used to uniquely identify a vehicle type.
            The make of a vehicle can be fully derived from this identifier.
          example: "0583"
        includedServices:
          type: array
          uniqueItems: true
          description: |
            Included services as part of the vehicle offer.
            Values <code>1</code> for German dealers (HU/AU) and <code>2</code> for Dutch dealers indicate that an inspection has been done recently and the vehicle is in a roadworthy state.

            > Allowed values can be retrieved via the references API (reference type IncludedService).

          items:
            type: integer
            description: |
              An included service ID.
          example: [ 1, 2 ]
        isMetallic:
          type: boolean
          description: |
            Whether the vehicle’s body color has a metallic effect.

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: true
        isNonSmoking:
          type: boolean
          description: |
            Whether the vehicle has been used by non-smokers only.

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: true
        isPluginHybrid:
          type: boolean
          description: |
            Whether the vehicle is a plugin hybrid.

            > If this property is set to <code>true</code>, then:

            > <code>primaryFuelType</code> OR <code>additionalFuelTypes</code> must contain <code>12</code> (Electric) AND <code>primaryFuelType</code> OR <code>additionalFuelTypes</code> must contain one fuel type != <code>12</code> (Electric)</li>

            > <code>fuelCategory</code> must be one of <code>3</code> (Electric/Diesel), <code>2</code> (Electric/Benzin) or <code>O</code> Others</li>
          example: true
        lastCamBeltServiceDate:
          type: string
          format: year-month
          description: |
            Date of last cam belt exchange.
            Cannot be in the future.

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: 2016-01
        lastTechnicalServiceDate:
          type: string
          format: year-month
          description: Date of last periodic maintenance
          example: 2016-06
        licencePlate:
          type: string
          minLength: 1
          maxLength: 10
          description: |
            Licence plate number of the vehicle

            > Emails are forbidden in the content


            > Forbidden characters are<code>&lt;</code> or <code>&gt;</code>

          example: M-2411-DC
        make:
          type: integer
          description: |
            Make identifier of the vehicle.

            > Allowed values can be retrieved via the makes API


            > Mandatory for all listings

          example: 13
        model:
          type: integer
          description: |
            The model of the vehicle (for cars and bikes)

            > Allowed values can be retrieved via the makes API


            > Mandatory for vehicleType <code>C</code> (car) and <code>B</code> (bike)


            > Forbidden for vehicleType <code>X</code> (light commercial vehicle), <code>N</code> (caravan/mobile home) and <code>L</code> (trailer)

          example: 1641
        modelName:
          type: string
          maxLength: 50
          example: Sprinter 310 Carlsen
          description: |
            The model of the vehicle (for Light Commercial Vehicles, Trailers, Caravans/Mobile homes)

            > Mandatory for vehicleType <code>X</code> (light commercial vehicle), <code>N</code> (caravan/mobile home) and <code>L</code> (trailer)


            > Forbidden for vehicleType <code>C</code> (car) and <code>B</code> (bike)

        modelVersion:
          type: string
          minLength: 1
          maxLength: 121
          description: |
            Additional information about the model.

            > Forbidden for vehicleType <code>X</code> (light commercial vehicle), <code>N</code> (caravan/mobile home) and <code>L</code> (trailer)


            > Emails are forbidden in the content


            > Forbidden characters are<code>&lt;</code> or <code>&gt;</code>


            > Strings longer than 50 characters are accepted by the API but will be truncated to 50 characters.

          example: Avant
        nextInspectionDate:
          type: string
          format: year-month
          description: |
            Date of next technical inspection as required by regulations.

            > Must be within the next 5 years, or in the past 5 years.

          example: 2028-01
        offerReferenceId:
          type: string
          description: |
            A reference ID for the vehicle that can be used by buyers.
            Will be shown on the AutoScout24 plaform

            > URLs are forbidden in the content


            > Emails are forbidden in the content


            > Forbidden characters are<code>&lt;</code> or <code>&gt;</code>

          example: A12453
          minLength: 1
          maxLength: 50
        power:
          type: integer
          minimum: 1
          maximum: 9999
          description: |
            Engine power in kW. Power in (German) PS does not need to be specified, as it will automatically be derived from this value.

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: 110
        previousOwnerCount:
          type: integer
          minimum: 0
          maximum: 99
          description: |
            Number of previous vehicle owners.

          example: 1
        primaryFuelType:
          type: integer
          description: |
            Fuel type with the lowest emission for the vehicle. This is derived from German emission/consumption regulations for vehicles (EnVKV).

            > Allowed values can be retrieved via the references API (reference type FuelType).

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car) and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)
          example: 1
        productionYear:
          type: string
          description: |
            The year when the vehicle was manufactured.
          example: "2014"
        seatCount:
          type: integer
          minimum: 1
          maximum: 99
          description: |
            Number of seats of the vehicle

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: 5
        transmission:
          type: string
          description: |
            Specifies the transmission type of the vehicle (e.g. manual, automatic).

            > Allowed values can be retrieved via the references API (reference type Transmission).

            > Valid values for this reference type are dependent on the marketplace country of the customers.

            > Forbidden for vehicleType <code>L</code> (trailer)

          example: "M"
        totalHeight:
          type: integer
          description: |
            Height of the vehicle in mm. Only available when vehicleType is <code>N</code>.

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike), <code>X</code> (light commercial vehicle) and <code>L</code> (trailer)

          example: 200
          minimum: 1
        totalLength:
          type: integer
          description: |
            Length of the vehicle in mm. Only available when vehicleType is <code>N</code>.

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike), <code>X</code> (light commercial vehicle) and <code>L</code> (trailer)

          example: 200
          minimum: 1
        totalWidth:
          type: integer
          description: |
            Width of the vehicle in mm. Only available when vehicleType is <code>N</code>

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike), <code>X</code> (light commercial vehicle) and <code>L</code> (trailer)

          example: 200
          minimum: 1
        tsn:
          type: string
          minLength: 3
          maxLength: 3
          description: |
            Typschluesselnummer: Identifier used by vehicle manufacturers in Germany to specify a vehicle type.
            From TSN the following parameters can be derived: Model, body, engine type, fuel type etc.
            Combined with HSN a make/model combination can be fully specified.
          example: "936"
        upholsteryColor:
          type: integer
          description: |
            Basic color of vehicle’s interior. Used to enable search by basic interior color.

            > Allowed values can be retrieved via the references API (reference type InteriorColor)


            > Forbidden for vehicleType <code>L</code> (trailer)

          example: 1
        upholsteryType:
          type: string
          description: |
            The type of upholstery the vehicle has

            > Allowed values can be retrieved via the references API (reference type Upholstery)


            > Forbidden for vehicleType <code>L</code> (trailer)

          example: "AL"
        vehicleType:
          description: |
            The type of vehicle being listed.
            
            > Mandatory for all listings
            
            > Allowed values can be retrieved via the references API (reference type VehicleType).

            > Valid values for this reference type are dependent on the marketplace country of the customers.

          allOf:
            - $ref: '#/components/schemas/VehicleTypeId'
        vin:
          type: string
          minLength: 17
          maxLength: 17
          description: |
            Vehicle Identification Number. A unique international code including a serial number used to identify individual motor vehicles, towed vehicles and motorcycles

            > Emails are forbidden in the content


            > Forbidden characters are<code>&lt;</code> or <code>&gt;</code>

          example: AB023475861123745
        wasCabOrRental:
          type: boolean
          description: |
            Whether the vehicle has been used as cab or rental car or driving school car.

            > Forbidden for vehicleType <code>B</code> (bike), <code>N</code> (caravan/mobile home) and <code>L</code> (trailer)

          example: false
        wheelbase:
          type: integer
          description: |
            The distance between the centers of the front and rear wheels, measured in millimeters.

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike) and <code>L</code> (trailer)

          minimum: 1
          example: 2800
        youtubeVideoUrl:
          type: string
          format: url
          minLength: 1
          maxLength: 256
          description: |
            Youtube video for the vehicle.
            Videos from other platforms other than Youtube are not accepted

            > Must be a YouTube URL

          example: "https://www.youtube.com/watch?v=wnKJnWRa_Ks"
        grossVehicleWeight:
          type: integer
          description: |
            The maximum operating weight of a vehicle measured in kg, including its chassis, body, engine, engine fluids, fuel, accessories, driver, passengers and cargo

            > Forbidden for vehicleType <code>C</code> (car) and <code>B</code> (bike)

          minimum: 1
          example: 3500
        images:
          type: array
          description: |
            The images to associate with this listing.
            It will fully replace the previous associated images.
            Orphan images will be deleted immediately after the operation.
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ImagePayload'
          maxItems: 50
          example:
            - id: 269e6ae5-a49b-4ea5-85a2-9c2093c26287
            - id: 84c7df0f-6806-4d07-b667-cb7ed5109a61
        loadHeight:
          type: integer
          description: |
            Maximum height of the load in millimeters

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike) and <code>N</code> (caravan/mobile home)

          minimum: 1
          example: 1900
        loadLength:
          type: integer
          description: |
            Maximum length of the load in millimeters

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike) and <code>N</code> (caravan/mobile home)

          minimum: 1
          example: 3800
        loadVolume:
          type: number
          description: |
            Maximum volume of the load in cubic meters

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike) and <code>N</code> (caravan/mobile home)

          example: 5.5
        loadWidth:
          type: integer
          description: |
            Maximum width of the load in millimeters

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike) and <code>N</code> (caravan/mobile home)

          minimum: 1
          example: 2100
        maximumTowingWeight:
          type: integer
          description: |
            The maximum weight the vehicle can tow in kg.

            > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike) and <code>L</code> (trailer)

          minimum: 1
          example: 130
        mileage:
          type: integer
          description: |
            The distance in kilometers that the vehicle has run.

            > Mandatory, and must be greater or equal than 0 when offerType is <code>J</code> (employee’s car), <code>S</code> (pre-registered), <code>O</code> (antique/classic), <code>U</code> (used) when vehicleType is C (car), B (bike) or X (light commercial vehicle)

            > Optional for vehicleType <code>N</code> (caravan/mobile home)

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Mileage must be less than 1000 when offerType is <code>N</code> (new)

          example: 75000
        payload:
          type: integer
          description: |
            Maximum payload the vehicle can carry in kg.

            > Forbidden for vehicleType <code>C</code> (car) and <code>B</code> (bike)

          minimum: 0
          example: 2900
        condition:
          description: |
            Describes the current condition of the vehicle
          allOf:
            - $ref: '#/components/schemas/Condition'
        battery:
          description: Information about the vehicle's battery
          allOf:
            - $ref: '#/components/schemas/BatteryPayload'
        wltp:
          description: |
            Provides WLTP consumption information.
            
            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
          allOf:
            - $ref: '#/components/schemas/WltpCommon'
        costModel:
          description: |
            Provides information about the costs associated with the vehicle.
            
            > This attribute only applies for customers that are dealers.

          allOf:
            - $ref: '#/components/schemas/CostModelPayload'

    ListingPayloadSharedAllSellers:
      allOf:
        - $ref: '#/components/schemas/BasePayloadShared'
        - type: object
          properties:
            isReserved:
              type: boolean
              description: |
                Whether the vehicle is reserved.
                
                > This attribute is only available for Smyle listings at the moment. Its value won't be considered valid and won't be displayed in the AutoScout24 websites. This is up to change in the future.
              example: true
            isEUReimport:
              type: boolean
              description: |
                Whether the vehicle is EU reimported.
                
                > This attribute is only available for Smyle listings at the moment. Its value won't be considered valid and won't be displayed in the AutoScout24 websites. This is up to change in the future.
              example: true
            images:
              type: array
              description: |
                The images to associate with this listing.
                It will fully replace the previous associated images.
                Orphan images will be deleted immediately after the operation.
              uniqueItems: true
              items:
                $ref: '#/components/schemas/ImagePayload'
              maxItems: 50
              example:
                - id: 269e6ae5-a49b-4ea5-85a2-9c2093c26287
                - id: 84c7df0f-6806-4d07-b667-cb7ed5109a61
            schwackeCode:
              description: |
                Classification of makes and models given by Eurotax/Schwacke
                > *Deprecated, use <code>natCode</code> instead*
              type: string
              maxLength: 22
              example: '20239429'
            europalletStorageSpaces:
              description: |
                The number of europallets that can be transported by the vehicle.
                
                > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike) and <code>N</code> (caravan/mobile home)
              type: integer
              example: 5
            drivingMode:
              type: string
              description: |
                The drive type of the bike. Possible values are ChainDrive, BeltDrive, CrankDrive.
                
                > Forbidden for vehicleType <code>C</code> (car), <code>X</code> (light commercial vehicle), <code>N</code> (caravan/mobile home) and <code>L</code> (trailer)
              enum: [ "ChainDrive", "BeltDrive", "CrankDrive" ]
              example: "ChainDrive"
            firstModelsProductionDate:
              description: |
                The date in which the first models of this vehicle were produced
              type: string
              format: year-month
              example: 2015-02
            marketing:
              description: |
                Provides additional marketing information
                
                
                > This attribute only applies for customers that are dealers.

              allOf:
                - $ref: '#/components/schemas/PartialMarketingPayload'
            natCode:
              description: |
                Classification of makes and models given by Eurotax/Schwacke
              type: string
              maxLength: 22
              example: '20239429'
            eCode:
              description: |
                Classification of makes and models given by data vendor DAT
                                
                > It should begins with "01" or "02" or "03" or "04" or "05"
                
                > All characters should be numeric
                
                > It is not allowed for vehicleType <code>L</code> (trailer) 

              type: string
              minLength: 15
              maxLength: 15
              example: '010200020100001'

