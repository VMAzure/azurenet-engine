                    registrationCosts: 99
                    leaseTotalAmount: 77005.6
                    netLoanAmount: 35956.34
                    borrowingRate: 95
                    borrowingRateType: Combined
                    effectiveInterestRate: 80
                    bank: Volkswagen Bank AG, Römerstr. 145, 04109 Leipzig
                    refundForLessDistance: 4.65
                    additionalDistanceCost: 12.65
                    dieselEnvironmentalBonus: false
                    duration: 48
