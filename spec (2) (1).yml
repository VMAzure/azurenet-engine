    ListingsStatisticsWrapper:
      required:
        - customerId
        - listings
        - snapshotDate
      properties:
        customerId:
          type: string
          description: The unique identifier of the customer
          example: 12345678
        listings:
          type: array
          description: the listings that were asked for
          items:
            $ref: '#/components/schemas/SingleListingStatistic'
        snapshotDate:
          type: string
          format: date-time
          description: |
            The time when the statistics were generated in ISO-8601 format.
          example: 2019-03-07T16:07:00.665267Z

    ListingsStatisticsWrapperPaged:
      allOf:
        - $ref: '#/components/schemas/ListingsStatisticsWrapper'
        - $ref: '#/components/schemas/CursorPagination'

    SingleListingStatistic:
      required:
        - id
        - priceLabelIndex
        - emailLeads
        - detailPageClicks
        - listPageViews
        - favorites
        - prints
        - calls
        - daysInStock
        - whatsAppClicks
      properties:
        id:
          type: string
          description: The unique identifier of the listing.
          example: cf04da2d-9c57-4758-8735-5257e4eb1cae
        priceLabelIndex:
          type: integer
          description: The price label index of the listing.
          example: 1
        emailLeads:
          type: integer
          description: The number of email leads of the listing.
          example: 1
        detailPageClicks:
          type: integer
          description: The number of clicks of the listing.
          example: 1
        listPageViews:
          type: integer
          description: The number of list page views of the listing.
          example: 1
        favorites:
          type: integer
          description: The number of favorites of the listing.
          example: 1
        prints:
          type: integer
          description: The number of prints of the listing.
          example: 1
        calls:
          type: integer
          description: The number of calls for the listing.
          example: 1
        probabilityToSellFast:
          type: string
          enum:
            - Low
            - Medium
            - High
          description: |
            The probability that this listing will be sold in the first 60 days.
            Optional, might not be set. String value is one of <code>High</code>, <code>Medium</code>, <code>Low</code>
            and is calculated based on the performance of similar listings.
          example: High
        daysInStock:
          type: integer
          description: The number of days since the listing creation.
          example: 1
        whatsAppClicks:
          type: integer
          description: The number of WhatsApp clicks of the listing.
          example: 1
        priceLabelRanges:
          type: array
          description: The price label ranges of the listing.
          items:
            $ref: '#/components/schemas/PriceEvaluationRanges'
        healthScore:
          type: integer
          description: An AI-generated score that evaluates the quality of the listing based on over 20 factors, including image quality, listing age, and completeness of characteristics. Higher scores indicate better listing quality (between 0 and 100).
          example: 1
        missingCharacteristics:
          type: array
          description: A list of key vehicle characteristics missing from this listing (e.g., missing fuel type, low number of images, transmission type, etc.). Adding these can improve the healthScore, although updates to this data are only made once daily.
          example: ["previousOwners", "fuelType"]
          items:
            type: string
        missingEquipments:
          type: array
          description: A list of equipment features that may be missing from this listing compared to 90% of similar listings on AutoScout24. Adding these features can make the listing more competitive.
          example: [31, 39, 118]
          items:
            type: integer
        minCompetitorPrice:
          type: number
          description: The minimum price of the competitors for this listing.
          example: 10000.00
        maxCompetitorPrice:
          type: number
          description: The maximum price of the competitors for this listing.
          example: 15000.40,
        listingPriceRank:
          type: integer
          description: The rank of the listing price compared to the competitors.
          example: 3
        averageCompetitorPrice:
          type: number
          description: The average price of the competitors for this listing.
          example: 15000.0
        competitorUrls:
          type: array
          description: List of competitor listing URLs for this listing.
          example: ["https://www.autoscout24.de/angebote/-comp1", "https://www.autoscout24.de/angebote/-comp2", "https://www.autoscout24.de/angebote/-comp3"]
          items:
            type: string

    PriceEvaluationResponse:
      properties:
        category:
