  /priceevaluation/{customerId}:
    post:
      operationId: getListingPriceEvaluation
      summary: Evaluates the price for a given listing.
      description: >
        This endpoint is restricted. If you are interested in using the price evaluation feature, please contact AutoScout24 to have it activated.
        
        **Note:**
        The following attributes from the <code>ListingPayload</code> are considered during price evaluation:
        
        **Required fields in the request body:**
          - `prices.public.price`: The public price of the listing
          - `offerType`: The type of offer
          - `make`: The vehicle make
          - `model`: The vehicle model
          - `bodyType`: The body type of the vehicle
          - `firstRegistrationDate`: The date of first registration
          - `fuelCategory`: The fuel category
          - `power`: The engine power
          - `transmission`: The type of transmission
        
        **Optional fields in the request body (used if present):**
          - `mileage`: The mileage of the vehicle
          - `consumption.combined`: Combined fuel consumption
          - `consumption.electricCombined`: Combined electric consumption
          - `doorCount`: Number of doors
          - `bodyColor`: The color of the vehicle body
          - `equipment`: List of equipment features
          - `availability.deliveryDays`: Number of days until delivery
      parameters:
        - in: path
          name: customerId
          schema:
            type: string
          required: true
          description: The ID of the customer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingPayload'
      responses:
        '200':
          description: |-
            The price evaluation was correctly retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceEvaluationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          $ref: '#/components/responses/ResourceNotAuthorized'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '500':
          $ref: '#/components/responses/ServerError'
      tags:
        - priceevaluation

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  responses:
    BadRequest:
      description: |-
        The provided payload (JSON body and/or query parameters) can't be validated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    AuthenticationFailed:
      description: |
        The supplied user credentials are invalid
    ResourceNotAuthorized:
      description: |
        The requested resource cannot be operated by the supplied user
    ResourceNotFound:
      description: |-
        The requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    RateLimitExceeded:
      description: |-
        The rate limit was exceeded. Try again later.
    ServerError:
      description: |
        There was an unexpected error on AutoScout24 side
    ServiceUnavailable:
      description: |
        The service is not available at the moment, likely due to a maintenance being performed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    UnprocessableEntity:
      description: |
        The service understands the content type of the request entity, and the syntax of the request entity is correct, but it was unable to process the contained instructions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'

  schemas:
    AvailabilityShared:
      type: object
      description: Shared attributes for an availability object.
      properties:
        availabilityType:
          type: integer
          description: |
            The availability of the vehicle. For example, "1" (available immediately)

            > Allowed values can be retrieved via the references API (reference type AvailabilityType)

          example: 1
        deliveryDays:
          type: integer
          enum: [ 1, 2, 3, 4, 5, 6, 7, 14, 21, 28, 42, 60, 90, 120, 150, 180, 270, 360 ]
          description: |
            The number of days it will take to deliver the vehicle

            > Either <code>deliveryDate</code> or <code>deliveryDays</code> must be present if the vehicle is not available immediately (availabilityType <code>2</code> or <code>3</code>)

          example: 7
        deliveryDate:
          type: string
          format: date
          description: |
            The earliest date that the vehicle can be delivered

            > Either <code>deliveryDate</code> or <code>deliveryDays</code> must be present if the vehicle is not available immediately (availabilityType <code>2</code> or <code>3</code>)

          example: 2018-12-01

    Autoproff:
      type: object
      description: Stores autoproff related attributes
      properties:
        mode:
          type: string
          enum: [ "write", "read", "ap_deleted" ]
          description: |
            Autoproff mode of the listing. Attribute can not be set.
          example: "write"

    Availability:
      required: [ availabilityType ]
      allOf:
        - $ref: '#/components/schemas/AvailabilityShared'

    BatteryCommon:
      type: object
      description: Provides information about the vehicle's battery
      properties:
        ownershipType:
          type: string
          example: 2
          description: |
            Ownership type of the battery.
            > Allowed values can be retrieved via the references API (reference type BatteryOwnershipType).
        chargingTime10to80Minutes:
          type: integer
          example: 800
          maximum: 25200
          minimum: 1
          description: |
            The time it takes in minutes to charge this car from 10% to 80% via the fastest way of charging.
        capacity:
          type: integer
          maximum: 999999
          minimum: 0
          description: |
            The capacity of the battery, in kWh.
          example: 5
        chargingTime:
          type: integer
          example: 800
          maximum: 1439
          minimum: 1
          description: |
            The time the car needs at 11KW charging station (comparable to the charging power of a Wallbox installed
            at home). Notation in minutes, integer.
        plugTypes:
          type: array
          uniqueItems: true
          description: |
            A set of supported plug types available at the vehicle.
            
            > Allowed values can be retrieved via the references API (reference type PlugType).
          example: ["TYPE_1", "TYPE_2"]
          items:
            type: string

    BatteryPayload:
      allOf:
        - $ref: '#/components/schemas/BatteryCommon'

    Battery:
      allOf:
        - $ref: '#/components/schemas/BatteryCommon'
        - type: object
          properties:
            capacityUnit:
              type: string
              description: Unit used for capacity field.
              example: "kWh"
    Channel:
      type: object
      description: a reference to a publication channel.
      required:
        - id
      properties:
        id:
          description: The identifier of the channel
          allOf:
            - $ref: '#/components/schemas/ChannelId'
        url:
          type: string
          format: url
          description: The URL where the listing is visible for the given channel
          example: "https://www.autoscout24.de/angebote/bmw-118-cf04da2d-9c57-4758-8735-5257e4eb1cae"

    ChannelId:
      description: |
        The id of a publication channel.
        <code>AS24Dealer</code> means that the vehicle is visible on AutoScout24’s dealer specific platform.
        <code>AS24</code> means that the vehicle is visible on AutoScout24's general platform. Bear in mind this is a superset of 'AS24Dealer'.
        <code>mobile_de</code> means that the vehicle is visible on <code>mobile_de</code> platform. This is not available for all customers yet, contact customer care to learn more.
        <code>autoproff</code> indicates exporting this vehicle to the autoproff account of the dealer. No effect if customer is not an autoproff customer or has not enabled selective exports via customer care.
        At least one publication channel must exist with the value of <code>AS24</code> or <code>AS24Dealer</code>
      type: string
      enum: [ "AS24", "AS24Dealer", "mobile_de", "autoproff", "autoproff_marketplace_public" ]
      example: "AS24"

    ChannelReference:
      type: object
      description: a reference to a publication channel.
      required:
        - id
      properties:
        id:
          description: The identifier of the channel
          allOf:
            - $ref: '#/components/schemas/ChannelId'

    Condition:
      type: object
      description: Describes the current condition of the vehicle.
      properties:
        hadAccident:
          type: boolean
          description: Should be set to true if the vehicle has had an accident in the past, irrespective of whether the vehicle has been repaired, or is currently roadworthy.
          example: true
        isCurrentlyDamaged:
          type: boolean
          description: |
            Should be set to true if the vehicle is currently damaged.

            > This attribute is only available for the German market. Its value won't be considered valid and won't be displayed in the AutoScout24 websites from other countries.
          example: true
        isRoadworthy:
          type: boolean
          description: |
            Should be set to true if the vehicle is fit for use on the road.

            > This attribute is only available for the German market. Its value won't be considered valid and won't be displayed in the AutoScout24 websites from other countries.
          example: true
        description:
          type: string
          description: |
            Detailed description of the condition.
          example: |
            This car is **great**. \ It has no accidents: \ * not damaged \ * not painted
        hasRepairedDamages:
          type: boolean
          description: |
            Whether it has damages that are repaired.
          example: true

    Consumption:
      type: object
      description: Provides information about the different fuel and electric consumption the vehicle has.
      properties:
        combined:
          type: number
          minimum: 0.1
          maximum: 99.9
          description: |
            Vehicle’s combined fuel consumption. l/100 km for petrol and diesel vehicles, kg/100km for compressed natural gas and hydrogen vehicles.

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car), the primary fuel type is not <code>12</code> (Electricity) and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden for German dealers when the vehicle type is <code>C</code> (Car) or <code>X</code> (Light Commercial Vehicle) and primary fuel type <code>12</code> (Electricity).

            > However, when both fields <code>primaryFuelType</code> and <code>additionalFuelTypes</code> are set, then both <code>combined</code> and <code>electricCombined</code> are allowed.
          example: 6.3
        electricCombined:
          type: number
          minimum: 0.1
          maximum: 99.9
          description: |
            Electric vehicle’s combined power consumption in kWh/100 km.

            > *Deprecated, use <code>wltp.consumptionElectricCombined</code> or <code>wltp.consumptionElectricCombinedWeighted</code> instead*

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car), the primary fuel type is <code>12</code> (Electricity) and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden for German dealers when vehicle type <code>C</code> (Car) or <code>X</code> (Light Commercial Vehicle) and primary fuel type different than <code>12</code> (Electricity).

            > However, when both fields <code>primaryFuelType</code> and <code>additionalFuelTypes</code> are set, then both <code>combined</code> and <code>electricCombined</code> are allowed.
          example: 6.6

    Culture:
      description: |
        A combination of country and language in which AutoScout24 offers their service, encoded as a locale.
        The AutoScout24.com domain is offered in English and is represented by the culture <code>en-GB</code>
      type: string
      enum: [ "de-DE", "de-AT", "nl-BE", "fr-BE", "fr-FR", "it-IT", "es-ES", "fr-LU", "en-GB", "nl-NL", "fr-CA", "en-CA" ]
      example: de-DE

    ErrorCulture:
      type: string
      enum: [ "de-DE", "de-AT", "it-IT", "en-GB" ]
      example: de-DE
      description: Supported cultures for translating validation error messages.

    CursorPagination:
      type: object
      properties:
        cursorPagination:
          type: object
          example: |
            {
              "startToken": "eyJ0eXAiOi",
              "maxItems": 10000,
              "nextPage": "https://listing-creation.api.autoscout24.com/statistics/123/listings?start_token=eyJ0eXAiOi&max_items=10000"
            }
          required:
            - startToken
            - maxItems
          description: |
            The cursor pagination object. This object is used to paginate through the listings statistics.
          properties:
            startToken:
              type: string
              description: |
                The opaque token used to start the current page.
              example: "eyJ0eXAiOi"
            maxItems:
              type: integer
              description: The applied limit for the number of items in the response.
              example: 10000
            nextPage:
              type: string
              description: |
                The optional URL to retrieve the next page of the cursor pagination.
                If not set, you reached the end of the pagination.
                All previously set parameters will be kept as is.
              example: "https://listing-creation.api.autoscout24.com/statistics/123/listings?start_token=eyJ0eXAiOi&max_items=10000"

    Customer:
      required:
        - id
        - canSetMiaRequestedTier
        - canUseSellOnline
      properties:
        id:
          description: The unique identifier of this customer used throughout the API
          type: string
          example: "2142082683"
        sellId:
          description: |
            Customer identification number (Sell-ID) from the AutoScout24 CRM system, which is also printed on official dealer invoice/communication documents.
            Note: only the id can be used to make requests.
          type: string
          example: "892611"
        companyName:
          description: |
            Customer company name from the AutoScout24 CRM system.
          type: string
          example: "ATEST Motors LT"
        canSetMiaRequestedTier:
          description: |
            If a customer has a contract to use the manualTier feature.
            See MiaPayload section for more information about this feature.
          type: boolean
          example: true
        canUseSellOnline:
          description: |
            If a customer has a contract to use the sellOnline feature.
            <strong>:construction: This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
          type: boolean
          example: true
        externalId:
          description: |
            An optional String ID that can be set by customer care to identify the dealer across systems.
          type: string
          example: "1085"

    CustomerSeals:
      properties:
        sealsId:
          type: array
          description: List of seals
          example: [ 1, 2, 3 ]
          uniqueItems: true
          items:
            type: integer
            description: List of seals

    Customers:
      properties:
        customers:
          description: a list of customers
          type: array
          items:
            $ref: '#/components/schemas/Customer'

    DealerPrice:
      allOf:
        - $ref: '#/components/schemas/Price'
        - type: object
          properties:
            netPrice:
              type: integer
              minimum: 1
              description: |
                Net price for the vehicle
                
                > Must be less than <code>price</code>
              example: 15300
            vatRate:
              type: number
              minimum: 0.0
              maximum: 100.0
              description: |
                The value added tax rate.

                > Only 1 decimal is accepted. If more decimals are sent they will be truncated.
              example: 17

    Discount:
      required:
        - priceAlreadyDiscounted
        - fixedAmount
      properties:
        priceAlreadyDiscounted:
          type: boolean
          example: false
          description: |
            Indicates whether a discount is already included in a price / monthly rate.
        fixedAmount:
          type: integer
          description: |
            An amount to be discounted
          example: 500

    ExclusiveOfferPayload:
      required:
        - description
        - endDate
      properties:
        description:
          type: string
          maxLength: 300
          description: |
            A description about the exclusive offer
            <strong>🚧 This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
          example: 10% off for the first 10 days.
        endDate:
          type: string
          format: date
          description: |
            A date by which the exclusive offer expires.
            <strong>🚧 This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
          example: 2020-09-10

    ExclusiveOffer:
      properties:
        description:
          type: string
          maxLength: 300
          description: |
            A description about the exclusive offer
            <strong>🚧 This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
          example: 10% off for the first 10 days.
        endDate:
          type: string
          format: date
          description: |
            A date by which the exclusive offer expires.
            <strong>🚧 This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
          example: 2020-09-10

    FallbackAttributesBase:
      required:
        - value
        - sourceTimestamp
      properties:
        value:
          type: number
          example: 85.4
          description: |
            Number value for fallback attributes.
        sourceTimestamp:
          type: string
          format: date-time
          example: 2019-02-07T16:07:00.665267Z
          description: |
            Datetime value for fallback attributes in ISO-8601 format.

    FallbackAttributesInteger:
      required:
        - value
        - sourceTimestamp
      properties:
        value:
          type: integer
          example: 1
          description: |
            Integer value for fallback attributes.
        sourceTimestamp:
          type: string
          format: date-time
          example: 2019-02-07T16:07:00.665267Z
          description: |
            Datetime value for fallback attributes in ISO-8601 format.

    FallbackAttributesConsumption:
      description: |
        Consumption fallback attributes.
      properties:
        combined:
          description: Combined fallback attributes in consumption.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        electricCombined:
          description: Electric combined fallback attributes in consumption.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'

    FallbackAttributesWltp:
      properties:
        co2EmissionsCombined:
          description: |
            Co2 emissions combined fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        co2EmissionsCombinedWeighted:
          description: |
            Co2 emissions combined weighted fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        consumptionCombined:
          description: |
            Consumption combined fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        consumptionElectricCombined:
          description: |
            Consumption electric combined fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        consumptionCombinedWeighted:
          description: |
            Consumption combined weighted fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        consumptionElectricCombinedWeighted:
          description: |
            Consumption electric combined weighted fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        co2Class:
          description: |
            Co2 class fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesInteger'
        consumptionCombinedDischarged:
          description: |
            Consumption combined discharged fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        co2ClassDischarged:
          description: |
            Co2 class discharged fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesInteger'

    FallbackAttributes:
      properties:
        electricRange:
          description: |
            Electric range fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        wltp:
          description: |
            Wltp fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesWltp'
        co2Emissions:
          description: |
            Co2 emissions fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
        consumption:
          description: |
            Consumption fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesConsumption'
        efficiencyClass:
          description: |
            Efficiency class fallback attributes.
          allOf:
            - $ref: '#/components/schemas/FallbackAttributesBase'
    FinancingOffer:
      allOf:
        - $ref: '#/components/schemas/FinancingOfferCommon'
        - type: object
          properties:
            annualRateUnit:
              type: string
              description: Unit used for annualRate field.
              example: "%"
            debitInterestRateUnit:
              type: string
              description: Unit used for debitInterestRate field.
              example: "%"
            durationUnit:
              type: string
              description: Unit used for duration field.
              example: months

    FinancingOfferPayload:
      required: [ annualRate, bank, currency, debitInterestRate, debitInterestType, duration, financingType, grossCreditAmount, monthlyRate, netCreditAmount ]
      allOf:
        - $ref: '#/components/schemas/FinancingOfferCommon'

    FinancingOfferCommon:
      properties:
        annualRate:
          minimum: 0
          maximum: 99.99
          type: number
          description: Annual rate in %.
          example: 10
        bank:
          type: string
          maxLength: 2000
          description: |
            Name, legal form, address, postal code and city of bank as well as other financing offer conditions.
            Also indicate whether the financing offer requires the conclusion of an insurance contract or a contract for other supplementary benefits.
            If the cost of this contract cannot be determined in advance, indicate the obligation to conclude this contract
            (e.g. compulsory conclusion of a comprehensive insurance contract)
          example: Mercedes-Benz Bank AG, Siemensstraße 7, 70469 Stuttgart
        bankSecondLanguage:
          type: string
          maxLength: 2000
          description: |
            Dealers using EDF (Exclusive Dealer Financing) in Belgium need to fill in an additional "Other Financing Conditions" field.
            Due to legal requirements, text needs to be displayed in French on FR-BE and in Dutch on NL-BE.
            In order to avoid financial consequences, both versions must be filled in.
          example: |
            FR version: Prêt à tempérament tous buts de 8.500 €, TAEG (Taux Annuel Effectif Global) de 5,99% (taux débiteur annuel fixe : 5,99%),
            mensualité de 198,96 € pour une durée de crédit de 48 mois.
            NL version: Lening op afbetaling van € 8.500, JKP (jaarlijks kostenpercentage) van 5,99% (vaste jaarlijkse debetrente: 5,99%),
            maandelijkse aflossing van € 198,96 voor een looptijd van het krediet van 48 maanden.
        closingCosts:
          type: number
          minimum: 0
          maximum: 999999.99
          description: |
            A fee for placing the loan contract.
          example: 250.00
        currency:
          type: string
          enum: [ "EUR" ]
          description: |
            Currency for given financing offer fields.
          example: EUR
        debitInterestType:
          type: integer
          description: |
            Debit interest type.

            > Allowed values can be retrieved via the references API (reference type DebitInterestType).

          example: 1
        debitInterestRate:
          type: number
          minimum: 0
          maximum: 99.99
          description: Debit interest rate in %.
          example: 15
        duration:
          type: integer
          minimum: 1
          maximum: 999
          description: Duration of the loan contract in months.
          example: 3
        endingRate:
          type: number
          description: Ending rate.
          example: 100
          minimum: 0.00
          maximum: 999999.99
        financingType:
          type: string
          description: |
            Financing type.

            > Meaning of the values: <code>C</code> (Credit)

          enum: [ "C" ]
          example: C
        grossCreditAmount:
          type: number
          minimum: 0.01
          maximum: 999999999.99
          description: |
            Gross credit amount in EUR.
          example: 1000
        initialPayment:
          type: number
          minimum: 0.00
          maximum: 999999.99
          description: |
            Initial payment for the loan in EUR (if applicable).
          example: 5000
        monthlyRate:
          type: number
          minimum: 0.00
          maximum: 999999.99
          description: |
            Monthly rate in EUR.
          example: 200
        netCreditAmount:
          type: number
          minimum: 0.00
          maximum: 999999999.99
          description: |
            Net credit amount in EUR.
          example: 19999.9
        paymentProtectionInsurance:
          type: number
          minimum: 0.00
          maximum: 999999999.99
          description: |
            Monthly payment protection insurance rate in EUR.
          example: 100

    Highlight:
      description: |
        A short note highlighting a key feature of the vehicle

        > URLs are forbidden in the content

        > Emails are forbidden in the content

        > Forbidden characters are<code>&lt;</code> or <code>&gt;</code>
      type: string
      maxLength: 30
      minLength: 1
      example: "fully equipped"

    OnlineSale:
      type: object
      description: |
        An object describing the countries where the vehicle can be sold online and delivered to the buyer

        > only available for dealers
        > added to the listing when the customer has a National Listings subscription
      properties:
        deliveryAreas:
          type: object
          description: |
            The countries where the vehicle can be sold online and delivered to the buyer.
          example: |
            {
              "national": "DE"
            }
          properties:
            national:
              type: string
              format: string
              description: Country in which the listing can be delivered
              example: "DE"

    Image:
      required:
        - id
      properties:
        id:
          type: string
          format: guid
          description: The image identifier
          example: 269e6ae5-a49b-4ea5-85a2-9c2093c26287
        previewUrl:
          description: The URL of the image
          type: string
          example: "https://prod.pictures.autoscout24.net/listing-images/d0b91f24-68c2-4683-b575-db510e97fc2d_e5079988-9e05-43f0-8cba-6f37e6f1de28.jpg"
        md5:
          description: The unique MD5 hash identifier for image
          type: string
          example: bb3da223907cbe437bab4cf2e7343d61


    ImagePayload:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: guid
          description: The identifier of the image to associate to the listing
          example: 269e6ae5-a49b-4ea5-85a2-9c2093c26287

    ImageReference:
      required:
        - id
      properties:
        id:
          type: string
          format: guid
          description: The image identifier
          example: 269e6ae5-a49b-4ea5-85a2-9c2093c26287

    ImageMd5:
      properties:
        md5:
          description: The unique MD5 hash identifier for image
          type: string
          example: bb3da223907cbe437bab4cf2e7343d61

    ImagePresignedUrl:
      properties:
        imagePresignedUrl:
          description: |
            A pre-signed URL that allows you to grant temporary access to image for users who don't have permission to AWS S3 bucket.
            A pre-signed URL is signed with your credentials and can be used by any user.
          type: string
          example: https://{bucket-name}-{aws-account}-{aws-region}.s3.eu-west-1.amazonaws.com/{imageId}.{format}?{response-content}

    ImageStandard:
      allOf:
        - $ref: '#/components/schemas/ImagePresignedUrl'
        - $ref: '#/components/schemas/ImageReference'

    LeasingOffersPayload:
      required:
        - offers
      properties:
        offers:
          type: array
          description: |
            Allows a dealer to offer leasing when selling the vehicle.

            > Not available for dealers outside germany. This attribute only applies for customers that are dealers.
          items:
            $ref: '#/components/schemas/LeasingOfferPayload'
        providerId:
          type: string
          description: leasing offers id
          example: 823892

    LeasingOfferPayload:
      required:
        - contractType
        - downPayment
        - netLoanAmount
        - borrowingRate
        - borrowingRateType
        - effectiveInterestRate
        - bank
        - duration
        - includedMileage
        - grossMonthlyRate
        - targetGroup
      allOf:
        - $ref: '#/components/schemas/LeasingOfferCommon'

    LeasingOfferCommon:
      properties:
        referenceOfferId:
          type: string
          description: A reference ID for the leasing offer from the partner.
          example: a100
          minLength: 1
          maxLength: 50
        contractType:
          description: Type of leasing contract
          type: string
          enum: [ "KilometerLeasing" ]
          example: KilometerLeasing
        targetGroup:
          description: Target group
          type: string
          enum: [ "Private","Business","Both" ]
          example: Both
        grossListPrice:
          description: |
            Vehicle list price (gross)

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: 0
          example: 139999.95
        isTradeInPossible:
          description: Whether trade-in option is possible
          type: boolean
          example: true
        downPayment:
          description: |
            Downpayment

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: 0
          example: 10000.00
        finalInstallment:
          description: |
            Final installment

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: 0
          example: 9000.00
        negotiable:
          description: Monthly rate is negotiable
          type: boolean
          example: false
        conditions:
          description: Comments on the conditions around the leasing contract
          type: string
          example: Begrenztes Angebot, nur bis 31.02.2020.
        hasTransferCostsIncluded:
          description: Is the transfer of the vehicle from the manufacturer to the dealer included in the price?
          type: boolean
          minimum: 0
          example: true
        transferCosts:
          description: |
            Total costs for transporting the vehicle from the manufacturer to the dealer and subsequent preparation of the vehicle

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          example: 100.00
        hasRegistrationCostsIncluded:
          description: Is the registration of the vehicle and the license plate included in the price?
          type: boolean
          example: false
        registrationCosts:
          description: |
            Total cost of vehicle registration including license plate number (if requested by the customer).

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: 0
          example: 99.00
        leaseTotalAmount:
          description: |
            The total gross amount to be paid by the consumer for the entire term.

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: 0.01
          example: 77005.60
        netLoanAmount:
          description: |
            Net loan amount

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
            
            > May be set to 0 for LeasingMarkt
          type: number
          minimum: 0.01
          example: 35956.34
        borrowingRate:
          description: |
            Borrowing rate p.a.

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: -100
          maximum: 100
          example: 95.00
        borrowingRateType:
          description: Type of nominal interest rate
          type: string
          enum: [ "Bound", "Changeable", "Combined" ]
          example: Combined
        effectiveInterestRate:
          description: |
            Effective interest rate

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: -100
          maximum: 100
          example: 80.00
        bank:
          description: Leasing bank (full name and address)
          type: string
          example: Volkswagen Bank AG, Römerstr. 145, 04109 Leipzig
          maxLength: 2000
          minLength: 1
        refundForLessDistance:
          description: |
            Remuneration for less distance (in cents per kilometer)

            > Forbidden for contract type is not <code>KilometerLeasing</code>

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: 0
          example: 4.65
        additionalDistanceCost:
          description: |
            Cost per additional distance (in cents per kilometer)

            > Forbidden if contract type is not <code>KilometerLeasing</code>

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: 0
          example: 12.65
        dieselEnvironmentalBonus:
          description: Does this offer only apply to customers who will scrap or trade in a diesel vehicle?
          type: boolean
          example: false
        duration:
          description: Term of the contract (in months)
          type: integer
          minimum: 1
          maximum: 90
          example: 48
        includedMileage:
          description: Annual mileage (in km)
          type: integer
          minimum: 0
          example: 15000
        grossMonthlyRate:
          description: |
            Monthly rate (gross)

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: 0.01
          example: 1395.95
        netMonthlyRate:
          description: |
            Monthly rate (net)

            > Only two decimals are accepted. If more decimals are sent they will be truncated.
          type: number
          minimum: 0.01
          example: 1095.95

    LeasingOffers:
      required:
        - offers
      properties:
        offers:
          type: array
          description: |
            Allows a dealer to offer leasing when selling the vehicle.

            > Not available for dealers outside germany. This attribute only applies for customers that are dealers.
          items:
            $ref: '#/components/schemas/LeasingOffer'
        providerId:
          type: string
          description: leasing offers id
          example: 823892

    LeasingOffer:
      allOf:
        - $ref: '#/components/schemas/LeasingOfferCommon'
        - type: object
          properties:
            borrowingRateUnit:
              type: string
              description: Unit used for borrowingRate field.
              example: "%"
            effectiveInterestRateUnit:
              type: string
              description: Unit used for effectiveInterestRate field.
              example: "%"
            grossMonthlyRateUnit:
              type: string
              description: Unit used for grossMonthlyRate field.
              example: "EUR"
            netMonthlyRateUnit:
              type: string
              description: Unit used for netMonthlyRate field.
              example: "EUR"
            durationUnit:
              type: string
              description: Unit used for duration field.
              example: "months"
            includedMileageUnit:
              type: string
              description: Unit used for includedMileage field.
              example: "km"

    PartialMiaPayload:
      allOf:
        - type: object
          properties:
            requestedTier:
              type: string
              description: |
                The required tier for the MIA vehicle.
              enum: [ "T20", "T30", "T40" ]
              example: "T30"
            subtitle:
              type: string
              description: |
                The subtitle for the MIA vehicle.
              example: "MIA T30"

    PartialListingBoostPayload:
      allOf:
        - type: object
          properties:
            requested:
              type: boolean
              description: |
                The request required for the listing to become a ListingBoost candidate.
                Should be set to TRUE if a ListingBoost is requested to apply, FALSE if it is requested to be removed, or NULL if no change is needed.
              example: false

    PartialMarketingPayload:
      allOf:
        - type: object
          properties:
            mia:
              description: |
                Provides a manual override for the MIA product for this listing
              allOf:
                - $ref: '#/components/schemas/PartialMiaPayload'
            listingBoost:
              description: |
                Provides a request for this listing to be a ListingBoost candidate.
                Should be set to TRUE if a ListingBoost is requested to apply, FALSE if it is requested to be removed, or NULL if no change is needed.
              allOf:
                - $ref: '#/components/schemas/PartialListingBoostPayload'

    ListingPayload:
      required: [ availability, bodyType, make, offerType, publication, prices, vehicleType ]
      allOf:
        - $ref: '#/components/schemas/ListingPayloadSharedAllSellers'
        - $ref: '#/components/schemas/ListingPayloadSharedDealerOnly'
        - type: object
          properties:
            availability:
              description: |
                Provides information about when the vehicle is available.

                > Mandatory for all listings

              allOf:
                - $ref: '#/components/schemas/Availability'
            offerType:
              type: string
              description: |
                Specifies the offer type of the vehicle.

                > Allowed values can be retrieved via the references API (reference type OfferType)


                > Mandatory for all listings
              example: U
            publication:
              description: |
                Provides information about the publication status of the listing

                > Mandatory for all listings
              allOf:
                - $ref: '#/components/schemas/PublicationPayload'
            prices:
              description: |
                Provides price information for the vehicle.

                > Mandatory for all listings
              allOf:
                - $ref: '#/components/schemas/Prices'
            twinner:
              description: Provides Twinner information for the vehicle.
              allOf:
                - $ref: '#/components/schemas/TwinnerPayload'

    PartialListingPayload:
      allOf:
        - $ref: '#/components/schemas/ListingPayloadSharedAllSellers'
        - type: object
          properties:
            crossReferenceId:
              type: string
              description: |
                A reference that can be used when managing or identifying listings.
                This information will not be shown on the AutoScout24 platform.

                > URLs are forbidden in the content


                > Emails are forbidden in the content


                > Forbidden characters are<code>&lt;</code> or <code>&gt;</code>


                > This attribute only applies for customers that are dealers.

              minLength: 1
              maxLength: 50
              example: DATX_002
            warranty:
              type: integer
              minimum: 0
              maximum: 999
              description: |
                Specifies the length in months of an additional warranty that is offered by the dealer.
                This warranty must be included in the vehicle price.
                If this field is not set, no warranty is provided

                > This attribute only applies for customers that are dealers.
              example: 12
            hasWarranty:
              type: boolean
              description: |
                Whether the vehicle has warranty.
                If warranty is set to 0 this can't be set to 'true'
                If warranty is set to > 0 this can't be set to 'false'

                > This attribute only applies for customers that are dealers.
              example: true
            availability:
              description: |
                Provides information about when the vehicle is available.

                > Mandatory for all listings


                > This attribute only applies for customers that are dealers (sellerType='Dealer').

              allOf:
                - $ref: '#/components/schemas/Availability'
            offerType:
              type: string
              description: |
                Specifies the offer type of the vehicle.

                > Allowed values can be retrieved via the references API (reference type OfferType)


                > Allowed values for dealers (sellerType='Dealer'): [ Active, Inactive ]


                > Allowed values for private sellers (sellerType='Private'): [ Active, Inactive, Draft ]


                > Mandatory for all listings

              example: U
            publication:
              description: |
                Provides information about the publication status of the listing

                > Mandatory for all listings
              allOf:
                - $ref: '#/components/schemas/PublicationPayload'
            prices:
              description: |
                Provides price information for the vehicle.

                > Mandatory for all listings
              allOf:
                - $ref: '#/components/schemas/Prices'
            requestedSeals:
              description: |
                List of IDs for the used vehicle seals granted for the vehicle.
                Available values for the customer can be retrieved using the getSealsForCustomer operation.

                <strong>Note:</strong> If passed seals are not granted with vehicle, the system will ignore those values and create the listings.

                > This attribute only applies for customers that are dealers.

              type: array
              example: [ 1, 2, 3 ]
              uniqueItems: true
              items:
                type: integer
            sealsOverwriteProtection:
              description: |
                It can be only set by dealers logging in through MLC. If set to true, the seals will not be overwritten with any update request from data providers.
              type: boolean
              example: true
            twinner:
              description: Provides Twinner information for the vehicle.
              allOf:
                - $ref: '#/components/schemas/TwinnerPayload'

    ListingPayloadSharedDealerOnly:
