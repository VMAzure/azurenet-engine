  /statistics/{customerId}/listings:
    get:
      operationId: getListingStatisticsBatched
      summary: Gets the statistics for all listings of a customer
      parameters:
        - in: path
          name: customerId
          schema:
            type: string
          required: true
          description: The ID of the customer
          example: 123
        - in: query
          name: startToken
          required: false
          example: "eyJ0eXAiOi"
          schema:
            type: string
          description: |
            Currently ignored!
            A opaque start token to retrieve the next batch of statistics.
            If not set, the first batch is returned.
            The startToken can only be obtained from a previous response and may not be set manually.
        - in: query
          name: maxItems
          required: false
          example: 100
          schema:
            type: integer
            minimum: 1
          description: |
            Currently ignored!
            A hint for the maximum number of statistics to return.
            If not set, the maximum number of statistics is returned.
            This parameter is taken as a hint and the server may return more or less results.
        - in: header
          name: x-as24-lca-ng-api-enable-v3-competitive-insights
          schema:
            type: string
            format: boolean
          required: false
          description: |
            This header is optional and completely based on internal testing purposes.
            Never rely on this header in production as it may get removed anytime in the future.
      responses:
        '200':
          description: |-
            The statistics were successfully retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingsStatisticsWrapperPaged'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          $ref: '#/components/responses/ResourceNotAuthorized'
        '404':
          description: If the customer does not exist, is not active or no statistics are available for the given customer.
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/ServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - statistics

