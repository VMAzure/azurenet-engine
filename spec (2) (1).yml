        - listings
    get:
      operationId: listListings
      summary: List all listings
      parameters:
        - in: path
          name: customerId
          schema:
            type: string
          required: true
          description: The ID of the customer whom the listings belong to
        - in: header
          name: X-Testmode
          schema:
            type: string
            format: boolean
          required: false
          description: |
            When set to true, it will only retrieve test listings.
        - in: query
          name: vinStatus
          schema:
            $ref: '#/components/schemas/VinEnrichmentStatus'
          explode: false
          required: false
          description: |
            Allow to filter the listings by vin enrichment status.
      responses:
        '200':
          description: |-
            200 response
          content:
            application/json:
              schema:
