    BaseSharedAllSellersNoImages:
      type: object
      required:
        - id
        - make
        - vehicleType
      properties:
        id:
          type: string
          format: guid
          description: |
            The unique identifier of the listing

            > Mandatory for all listings

          example: cf04da2d-9c57-4758-8735-5257e4eb1cae
        condition:
          description: Describes the current condition of the vehicle
          allOf:
            - $ref: '#/components/schemas/Condition'
        crossReferenceId:
          type: string
          description: |
            A reference that can be used when managing or identifying listings.
            This information will not be shown on the AutoScout24 platform.
          minLength: 1
          maxLength: 50
          example: DATX_002
        additionalFuelTypes:
          type: array
          description: |
            Additional supported fuel types that might accompany the primary fuel type.
            These fuel types can also be consumed by the vehicle but have higher emissions than the primary fuel type.
            This is derived from German emission/consumption regulations for vehicles (EnVKV).
          uniqueItems: true
          example: [ 2, 3 ]
          items:
            type: integer
            description: |
              Each of the fuel type identifiers. Allowed values can be retrieved via the references API
              (reference type FuelType)
        alloyWheelSize:
          type: integer
          minimum: 10
          maximum: 26
          description: |
            Size of alloy wheels of the vehicle (in inches).
          example: 18
        axleCount:
          type: integer
          description: |
            The number of axles the vehicle has.
          minimum: 1
          maximum: 6
          example: 1
        battery:
          description: Information about the vehicle's battery
          allOf:
            - $ref: '#/components/schemas/Battery'
        bedCount:
          type: integer
          description: |
            Total number of beds.
          example: 4
          minimum: 0
        belgianCarpassMileageUrl:
          type: string
          format: url
          description: |
            The URL for the Carpass technical inspection for the listed vehicle
          example: "https://public.car-pass.be/vhr/2a0f0719-1b7a-4e42-84e1-c5c746ab1c39"
        bodyColor:
          type: integer
          description: |
            Basic body color of the vehicle.
          example: 2
        bodyColorName:
          type: string
          minLength: 1
          maxLength: 30
          description: Manufacturers name of body color
          example: British Racing Green
        bodyType:
          type: integer
          description: |
            Shape of vehicle’s body.
            Valid values for this reference type are dependent on the marketplace country of the customer.
            Allowed values can be retrieved via the references API (reference type BodyType)
          example: 1
        countryVersion:
          type: string
          description: |
            Indicates the original market/country the vehicle was built for.
          example: AT
        co2Emissions:
          type: integer
          description: |
            Vehicle’s carbon dioxide emission in g/km.
          example: 23
        consumption:
          description: Provides fuel and electric consumption information for the vehicle.
          allOf:
            - $ref: '#/components/schemas/Consumption'
        cylinderCapacity:
          type: integer
          minimum: 1
          maximum: 99999
          description: |
            Volume of the engines cylinders in cubic centimeters.
          example: 1998
        cylinderCount:
          type: integer
          minimum: 1
          maximum: 99
          description: |
            The number of cylinders of the engine.
          example: 4
        description:
          type: string
          maxLength: 10000
          description: |
            Free text description of the vehicle.

            > Note that currently only the first 10000 characters are displayed. Generally 1 character is equal to 1 byte but characters from the extended alphabet like “ä” count as 2 bytes.
          example: |
            This car is **great**. \ It has the following features: \ * Low price \ * Great interior
        doorCount:
          type: integer
          minimum: 1
          maximum: 9
          description: |
            Number of doors the vehicle has
          example: 5
        drivetrain:
          type: string
          description: |
            Drive type of the vehicle.
          example: R
        efficiencyClass:
          type: integer
          description: |
            Vehicle’s energy efficiency class.
          example: 2
        electricRange:
          type: integer
          minimum: 1
          maximum: 10000
          example: 410
          description: The electric range of the vehicle in kilometers according to WLTP. (EAER)
        electricRangeCity:
          type: integer
          minimum: 1
          maximum: 10000
          example: 620
          description: The electric range of the vehicle in kilometers according to WLTP measured in cities. (EAER city)
        emptyWeight:
          type: integer
          minimum: 1
          maximum: 99999
          description: Vehicle’s weight without driver, passengers or liquids (like fuel) in kg.
          example: 1200
        equipment:
          type: array
          description: List of vehicle’s equipment
          example: [ 1, 2, 4, 15 ]
          uniqueItems: true
          items:
            type: integer
            description: |
              An equipment ID.
        euEmissionStandard:
          type: string
          description: |
            The EU emission standard indicates the amount of harmful substances the vehicle emits.
            The classification is in accordance with the European Standard Euronorm
          example: "1"
        firstActivatedDate:
          type: string
          format: date-time
          description: |
            Date of the listing first activation
          example: 2025-10-29T14:38:45.007421Z
        firstRegistrationDate:
          type: string
          format: year-month
          description: |
            Month and year of first registration of the vehicle.
          example: 2015-01
        fuelCategory:
          type: string
          description: |
            Category of fuel/energy source for the vehicle.
            Valid values for this reference type are dependent on the marketplace country of the customer.
            Allowed values can be retrieved via the references API (reference type FuelCategory)
          example: B
        gearCount:
          type: integer
          minimum: 1
          maximum: 9
          description: |
            Number of gears of the vehicle
          example: 6
        germanEmissionsSticker:
          type: integer
          description: |
            Emissions sticker type as assigned by German technical inspection authorities (Umweltplakette/Feinstaubplakette).
            Allowed values can be retrieved via the references API (reference type EmissionsSticker)
          example: 1
        hasCarRegistration:
          type: boolean
          description: |
            Indicates whether a vehicle is registered as a car in the registration documents
          example: false
        hasFullServiceHistory:
          type: boolean
          description: |
            Indicates whether vehicle has passed all periodic maintenance as recommended by the vehicle manufacturer.
          example: false
        hasParticleFilter:
          type: boolean
          description: |
            Indicates whether a diesel vehicle is equipped with a particle filter
          example: true
        hsn:
          type: string
          minLength: 4
          maxLength: 4
          description: |
            Herstellerschluesselnummer, or the unique identifier of vehicle manufacturer in Germany.
            In combination with TSN this key is used to uniquely identify a vehicle type.
            The make of a vehicle can be fully derived from this identifier.
          example: "0583"
        includedServices:
          type: array
          uniqueItems: true
          description: |
            Included services as part of the vehicle offer.
            Values <code>1</code> for German dealers (HU/AU) and <code>2</code> for Dutch dealers indicate that an inspection has been done recently and the vehicle is in a roadworthy state.
          items:
            type: integer
            description: |
              An included service ID.
          example: [ 1, 2 ]
        isMetallic:
          type: boolean
          description: |
            Whether the vehicle’s body color has a metallic effect.
          example: true
        isNonSmoking:
          type: boolean
          description: |
            Whether the vehicle has been used by non-smokers only.
          example: true
        isPluginHybrid:
          type: boolean
          description: |
            Whether the vehicle is a plugin hybrid.

            > If this property is set to <code>true</code>, then:
            
            > <code>primaryFuelType</code> OR <code>additionalFuelTypes</code> must contain <code>12</code> (Electric) AND <code>primaryFuelType</code> OR <code>additionalFuelTypes</code> must contain one fuel type != <code>12</code> (Electric)</li>
            
            > <code>fuelCategory</code> must be one of <code>3</code> (Electric/Diesel), <code>2</code> (Electric/Benzin) or <code>O</code> Others</li>
          example: true
        lastCamBeltServiceDate:
          type: string
          format: year-month
          description: |
            Date of last cam belt exchange.
            Cannot be in the future.
          example: 2016-01
        lastTechnicalServiceDate:
          type: string
          format: year-month
          description: Date of last periodic maintenance
          example: 2016-06
        licencePlate:
          type: string
          minLength: 1
          maxLength: 10
          description: Licence plate number of the vehicle
          example: M-2411-DC
        make:
          type: integer
          description: |
            Make identifier of the vehicle.
            Allowed values can be retrieved via the makes API

            > Mandatory for all listings
          example: 13
        model:
          type: integer
          description: |
            The model of the vehicle (for cars and bikes)
            Allowed values can be retrieved via the makes API
          example: 1641
        modelName:
          type: string
          maxLength: 50
          example: Sprinter 310 Carlsen
          description: |
            The model of the vehicle (for Light Commercial Vehicles, Trailers, Caravans/Mobile homes)
        modelVersion:
          type: string
          minLength: 1
          maxLength: 121
          description: |
            Additional information about the model
          example: Avant
        nextInspectionDate:
          type: string
          format: year-month
          description: |
            Date of next technical inspection as required by regulations.
          example: 2028-01
        offerReferenceId:
          type: string
          description: |
            A reference ID for the vehicle that can be used by buyers.
            Will be shown on the AutoScout24 plaform
          example: A12453
          minLength: 1
          maxLength: 50
        power:
          type: integer
          minimum: 1
          maximum: 9999
          description: |
            Engine power in kW. Power in (German) PS does not need to be specified, as it will automatically be derived from this value.
          example: 110
        previousOwnerCount:
          type: integer
          minimum: 0
          maximum: 99
          description: |
            Number of previous vehicle owners.
          example: 1
        primaryFuelType:
          type: integer
          description: |
            Fuel type with the lowest emission for the vehicle. This is derived from German emission/consumption regulations for vehicles (EnVKV).
            Allowed values can be retrieved via the references API (reference type FuelType).
          example: 1
        productionYear:
          type: string
          description: |
            The year when the vehicle was manufactured.
          example: "2014"
        seatCount:
          type: integer
          minimum: 1
          maximum: 99
          description: |
            Number of seats of the vehicle
          example: 5
        transmission:
          type: string
          description: |
            Specifies the transmission type of the vehicle (e.g. manual, automatic).
            Valid values for this reference type are dependent on the marketplace country of the customer.
            Allowed values can be retrieved via the references API (reference type Transmission).
          example: "M"
        totalHeight:
          type: integer
          description: |
            Height of the vehicle in mm. Only available when vehicleType is <code>N</code>.
          example: 200
          minimum: 1
        totalLength:
          type: integer
          description: |
            Length of the vehicle in mm. Only available when vehicleType is <code>N</code>.
          example: 200
          minimum: 1
        totalWidth:
          type: integer
          description: |
            Width of the vehicle in mm. Only available when vehicleType is <code>N</code>
          example: 200
          minimum: 1
        tsn:
          type: string
          minLength: 3
          maxLength: 3
          description: |
            Typschluesselnummer: Identifier used by vehicle manufacturers in Germany to specify a vehicle type.
            From TSN the following parameters can be derived: Model, body, engine type, fuel type etc.
            Combined with HSN a make/model combination can be fully specified.
          example: "936"
        upholsteryColor:
          type: integer
          description: |
            Basic color of vehicle’s interior. Used to enable search by basic interior color.
            Allowed values can be retrieved via the references API (reference type InteriorColor)
          example: 1
        upholsteryType:
          type: string
          description: |
            The type of upholstery the vehicle has
            Allowed values can be retrieved via the references API (reference type Upholstery)
          example: "AL"
        vehicleType:
          description: |
            The type of vehicle being listed.

            > Mandatory for all listings
          allOf:
            - $ref: '#/components/schemas/VehicleTypeId'
        vin:
          type: string
          minLength: 17
          maxLength: 17
          description: |
            Vehicle Identification Number. A unique international code including a serial number used to identify individual motor vehicles, towed vehicles and motorcycles
          example: AB023475861123745
        wasCabOrRental:
          type: boolean
          description: |
            Whether the vehicle has been used as cab or rental car or driving school car.
          example: false
        wheelbase:
          type: integer
          description: |
            The distance between the centers of the front and rear wheels, measured in millimeters.
          minimum: 1
          example: 2800
        wltp:
          description: Provides WLTP consumption information.
          allOf:
            - $ref: '#/components/schemas/WltpCommon'
            - $ref: '#/components/schemas/WltpUnits'
        youtubeVideoUrl:
          type: string
          format: url
          minLength: 1
          maxLength: 256
          description: |
            Youtube video for the vehicle.
          example: "https://www.youtube.com/watch?v=wnKJnWRa_Ks"
        emptyWeightUnit:
          type: string
          description: Unit used for emtyWeight field.
          example: kg
        alloyWheelSizeUnit:
          type: string
          description: Unit used for alloyWheel field.
          example: in
        co2EmissionsUnit:
          type: string
          description: Unit used for co2Emissions field.
          example: g/km
        combinedUnit:
          type: string
          description: Unit used for combined field.
          example: l/100km
        powerUnit:
          type: string
          description: Unit used for power field
          example: kW
        mileage:
          type: integer
          description: The distance that the vehicle has run
          example: 75000
        mileageUnit:
          type: string
          description: Unit used for mileage field
          example: km
        cylinderCapacityUnit:
          type: string
          description: Unit used for cylinderCapacity field
          example: m3
        payload:
          type: integer
          description: |
            Maximum payload the vehicle can carry.
          minimum: 0
          example: 2900
        payloadUnit:
          type: string
          description: Unit used for payload field
          example: kg
        grossVehicleWeight:
          type: integer
          description: |
            The maximum operating weight of a vehicle including its chassis, body, engine, engine fluids, fuel,
            accessories, driver, passengers and cargo.
          minimum: 1
          example: 3500
        grossVehicleWeightUnit:
          type: string
          description: Unit used for grossVehicleWeight field.
          example: kg
        loadHeight:
          type: integer
          description: Maximum height of the load.
          minimum: 1
          example: 1900
        loadHeightUnit:
          type: string
          description: Unit used for loadHeight field.
          example: mm
        loadVolumeUnit:
          type: string
          description: Unit used for loadVolume field.
          example: m3
        loadVolume:
          type: number
          description: Maximum volume of the load.
          example: 5.5
        loadWidthUnit:
          type: string
          description: Unit used for loadWidth field.
          example: mm
        loadWidth:
          type: integer
          description: Maximum width of the load.
          minimum: 1
          example: 2100
        loadLengthUnit:
          type: string
          description: Unit used for loadLength field.
          example: mm
        loadLength:
          type: integer
          description: Maximum length of the load.
          minimum: 1
          example: 3800
        wheelbaseUnit:
          type: string
          description: Unit used for wheelbase field.
          example: mm
        maximumTowingWeightUnit:
          type: string
          description: Unit used for maximumTowingWeight field.
          example: kg
        maximumTowingWeight:
          type: integer
          description: The maximum weight the vehicle can tow.
          minimum: 1
          example: 130
        totalHeightUnit:
          type: string
          description: Unit used for totalHeight field.
          example: mm
        totalLengthUnit:
          type: string
          description: Unit used for totalLength field.
          example: mm
        totalWidthUnit:
          type: string
          description: Unit used for totalWidth field.
          example: mm
        electricCombinedUnit:
          type: string
          description: Unit used for electricCombined field.
          example: kWh/100km
        costModel:
          description: Provides cost information for the vehicle.
          allOf:
            - $ref: '#/components/schemas/CostModel'
            - $ref: '#/components/schemas/CostModelUnits'

    ListingSharedAllSellersNoImages:
      allOf:
        - $ref: '#/components/schemas/BaseSharedAllSellersNoImages'
        - type: object
          properties:
            drivingMode:
              type: string
              description: |
                The drive type of the bike. Possible values are ChainDrive, BeltDrive, CrankDrive.
                > Forbidden for vehicleType <code>C</code> (car), <code>X</code> (light commercial vehicle), <code>N</code> (caravan/mobile home) and <code>L</code> (trailer)
              enum: [ "ChainDrive", "BeltDrive", "CrankDrive" ]
              example: "ChainDrive"
            europalletStorageSpaces:
              type: integer
              description: |
                The number of europallets that can be transported by the vehicle.
                > Forbidden for vehicleType <code>C</code> (car), <code>B</code> (bike) and <code>N</code> (caravan/mobile home)
              example: 5
            isEUReimport:
              type: boolean
              description: |
                Whether the vehicle is EU reimported.

                > This attribute is only available for Smyle listings at the moment. Its value won't be considered valid and won't be displayed in the AutoScout24 websites. This is up to change in the future.
              example: true
            isReserved:
              type: boolean
              description: |
                Whether the vehicle is reserved.
                
                > This attribute is only available for Smyle listings at the moment. Its value won't be considered valid and won't be displayed in the AutoScout24 websites. This is up to change in the future.
              example: true
            schwackeCode:
              description: |
                Classification of makes and models given by Eurotax/Schwacke
                > *Deprecated, use <code>natCode</code> instead*
              type: string
              maxLength: 22
              example: 20239429
            twinner:
              description: Provides Twinner information for the vehicle.
              allOf:
                - $ref: '#/components/schemas/TwinnerPayload'
            natCode:
              description: |
                Classification of makes and models given by Eurotax/Schwacke
              type: string
              maxLength: 22
              example: '20239429'
            eCode:
              description: |
                Classification of makes and models given by data vendor DAT
                                
                > It should begins with "01" or "02" or "03" or "04" or "05"
                
                > All characters should be numeric
                
                > It is not allowed for vehicleType <code>L</code> (trailer) 

              type: string
              minLength: 15
              maxLength: 15
              example: '010200020100001'

    ListingSharedAllSellers:
      allOf:
        - $ref: '#/components/schemas/ListingSharedAllSellersNoImages'
        - type: object
          properties:
            images:
              type: array
              description: |
                The images that are associated with this listing.
              uniqueItems: true
              items:
                $ref: '#/components/schemas/Image'
              maxItems: 50
              example:
                - id: 269e6ae5-a49b-4ea5-85a2-9c2093c26287
                  previewUrl: "https://prod.pictures.autoscout24.net/listing-images/d0b91f24-68c2-4683-b575-db510e97fc2d_269e6ae5-a49b-4ea5-85a2-9c2093c26287.jpg"
                  md5: bb3da223907cbe437bab4cf2e7343d61
                - id: 84c7df0f-6806-4d07-b667-cb7ed5109a61
                  previewUrl: "https://prod.pictures.autoscout24.net/listing-images/d0b91f24-68c2-4683-b575-db510e97fc2d_84c7df0f-6806-4d07-b667-cb7ed5109a61.jpg"
                  md5: bb3da223907cbe437bab4cf2e7343d61

    ListingSummary:
      type: object
      required:
        - id
        - createdAt
        - lastUpdatedAt
      properties:
        id:
          type: string
          format: guid
          description: The unique identifier of the listing
          example: cf04da2d-9c57-4758-8735-5257e4eb1cae
        createdAt:
          type: string
          format: date-time
          description: |
            The time when the listing was created in ISO-8601 format.
          example: 2019-02-07T16:07:00.665267Z
        lastUpdatedAt:
          type: string
          format: date-time
          description: |
            The time when the listing was last updated in ISO-8601 format.
            This value can be used to decide whether the local copy of the listing in a given client is stale or not.
          example: 2019-03-07T16:07:00.665267Z
        offerReferenceId:
          type: string
          description: |
            A reference ID for the vehicle that can be used by buyers.
            Will be shown on the AutoScout24 plaform
          example: A12453
        crossReferenceId:
          type: string
          description: |
            Cross Reference Id is an identifier used by Data Providers.
          example: CA-A12453
        vinEnrichmentStatus:
          description: The status of the vin enrichment
          allOf:
            - $ref: '#/components/schemas/VinEnrichmentStatus'
        vinEnrichmentMissingFields:
          type: array
          description: The missing fields after the VIN enrichment
          items:
            type: string
            description: |
              Each of the missing fields.
          example: [ "wltp.co2EmissionsCombined", "wltp.consumptionElectricCombined" ]

    Listings:
      type: object
      required:
        - listings
      properties:
        listings:
          type: array
          description: the listings that were asked for
          items:
            $ref: '#/components/schemas/ListingSummary'

    Make:
      required:
        - id
        - name
        - models
        - vehicleTypes
      properties:
        id:
          description: an identifier of the make
          type: integer
          example: 13
        name:
          description: the name of the given make
          type: string
          example: BMW
        models:
          type: array
          description: the set of models that belong to this make
          items:
            $ref: '#/components/schemas/Model'
        vehicleTypes:
          type: array
          description: the vehicle types for which this make is available
          items:
            $ref: '#/components/schemas/VehicleTypeId'

    Makes:
      properties:
        makes:
          description: a set of makes
          type: array
          items:
            $ref: '#/components/schemas/Make'

    MarketingPayload:
      properties:
        exclusiveOffer:
          description: |
            Allows to use the product Exclusive Offer on this listing
            <strong>:construction: This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
          allOf:
            - $ref: '#/components/schemas/ExclusiveOfferPayload'
        mia:
          description: Provides a manual override for the MIA product for this listing
          allOf:
            - $ref: '#/components/schemas/MiaPayload'
        listingBoost:
          description: |
            Allows to use the ListingBoost on this listing.
          allOf:
            - $ref: '#/components/schemas/ListingBoostPayload'
        redPencil:
          type: boolean
          description: |
            Bookable feature indicating that the price of a vehicle was reduced, showing the old price and the new price.
            <strong>🚧 This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
          example: false

    Marketing:
      properties:
        mia:
          description: Provides information about a possible manual override for the MIA product for this listing
          allOf:
            - $ref: '#/components/schemas/Mia'
        listingBoost:
          description: |
            Provides information about ListingBoost properties for this listing.
            This process is asynchronous. Please perform a GET request on the listing after a while to verify whether the ListingBoost has been applied.

            Please contact us if you are interested in this feature.
          allOf:
            - $ref: '#/components/schemas/ListingBoost'
        exclusiveOffer:
          description: |
            Allows to use the product Exclusive Offer on this listing
            <strong>:construction: This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
          allOf:
            - $ref: '#/components/schemas/ExclusiveOffer'
        redPencil:
          type: boolean
          description: |
            Bookable feature indicating that the price of a vehicle was reduced, showing the old price and the new price.
            <strong>🚧 This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
          example: false

    Tier:
      type: string
      enum: [ "T20", "T30", "T40", "T50" ]
      description: |
        The tier increases the priority and visibility of a listing in the search results.
        Available tier levels are: <code>T20</code> (PlusInserat/Optimum…), <code>T30</code> (PremiumInserat/Premium), <code>T40</code> (PlatinumInserat/Platinum), <code>T50</code> (SalesTurbo)
      example: T20

    Marketplace:
      type: string
      description: Marketplaces supported by AS24.
      example: "de"
      enum:
        - "at"
        - "be"
        - "ca"
        - "de"
        - "es"
        - "fr"
        - "it"
        - "lu"
        - "nl"

    MiaPayload:
      properties:
        subtitle:
          type: string
          maxLength: 55
          description: |
            An additional vehicle description, will be shown for listings that have a tier applied.
            Note a tier can be applied manually or automatically, so this value should be sent even if the requestedTier field is not set.

            > URLs are forbidden in the content


            > Emails are forbidden in the content


            > Forbidden characters are<code>&lt;</code> or <code>&gt;</code>
            
            > Empty strings are not allowed

          example: First hand, from an authorized dealer. Discount.
        requestedTier:
          type: string
          enum:
            - "T20"
            - "T30"
          description: |
            Increases the priority and visibility of listings in the search results.
            Adding a tier will cause charges to the dealer.

            > Tiers can only be added for dealers that have a contract to this feature.


            > This can be checked in the customer endpoint in <code>canSetMiaRequestedTier</code>. If a customer can not request a mia tier, it will be silently ignored.


            > Available tier levels are: <code>T20</code> (PlusInserat/Optimum…), <code>T30</code> (PremiumInserat/Premium).


            > Its not possible to set <code>T40</code> or <code>T50</code> as a requestedTier.

          example: T20

    Mia:
      properties:
        subtitle:
          type: string
          maxLength: 55
          description: An additional vehicle description, will be shown for listings that have a tier applied.  Note a tier can be applied manually or automatically.
          example: First hand, from an authorized dealer. Discount.
        appliedTier:
          type: string
          enum:
            - "T20"
            - "T30"
            - "T40"
            - "T50"
          description: |
            The tier increases the priority and visibility of a listing in the search results, set from tier product.
            Available tier levels are: <code>T20</code> (PlusInserat/Optimum…), <code>T30</code> (PremiumInserat/Premium), <code>T40</code> (PlatinumInserat/Platinum), <code>T50</code> (SalesTurbo)
          example: T20

    ListingBoostPayload:
      properties:
        requested:
          type: boolean
          description: |
            Indicates whether the ListingBoost is requested.
            Should be set to TRUE if a ListingBoost is requested to apply, FALSE if it is requested to be removed, or NULL/unspecified if no change on allocation is needed.
          example: false

    ListingBoost:
      properties:
        requested:
          type: boolean
          description: |
            Indicates whether the ListingBoost is requested.
            Should be set to TRUE if a ListingBoost is requested to apply, FALSE if it is requested to be removed, or NULL if no change is needed.
          example: false
        applied:
          type: boolean
          description: |
            Indicates whether the ListingBoost is applied.
            Returns TRUE if the ListingBoost is applied, or FALSE/NULL if the ListingBoost is not applied.
          example: false

    Model:
      required:
        - id
        - name
        - vehicleType
      properties:
        id:
          description: an identifier of the model
          type: integer
          example: 1641
        name:
          description: the name of the given model
          type: string
          example: 320
        vehicleType:
          description: The type of vehicle.
          allOf:
            - $ref: '#/components/schemas/VehicleTypeId'

    Price:
      type: object
      description: Provides price information for the vehicle
      required:
        - price
        - currency
      properties:
        price:
          type: integer
          minimum: 1
          description: Gross price for the vehicle
          example: 16500
        currency:
          type: string
          enum: [ "EUR", "CAD"]
          description: Currency for given price. Validated against values allowed for the Dealer Marketplace.
          example: EUR

    PricesShared:
      type: object
      properties:
        public:
          description: |
            Gross price for the vehicle, including VAT and any other applicable taxes.
            This price will be shown to the AutoScout24 users.
          allOf:
            - $ref: '#/components/schemas/PublicPrice'
        manufacturersSuggestedRetail:
          description: |
            The retail price of the vehicle as suggested by its manufacturer
          allOf:
            - $ref: '#/components/schemas/RetailPrice'

    Prices:
      required:
        - public
      allOf:
        - $ref: '#/components/schemas/PricesShared'
        - type: object
          properties:
            dealer:
              description: The price of the vehicle when offered to dealers. Only shown in the dealer Marketplace.
              allOf:
                - $ref: '#/components/schemas/DealerPrice'

    PublicPrice:
      allOf:
        - $ref: '#/components/schemas/Price'
        - type: object
          properties:
            vatRate:
              type: number
              minimum: 0.0
              maximum: 100.0
              description: |
                The value added tax rate.

                > Only 1 decimal is accepted. If more decimals are sent they will be truncated.
              example: 17
            netPrice:
              type: integer
              minimum: 1
              description: |
                Net price for the vehicle
                
                > Must be less than <code>price</code>
              example: 15300

            isNegotiable:
              type: boolean
              description: Indicates whether a given price is negotiable
              example: false
            isTaxDeductible:
              type: boolean
              description: Indicates whether value added tax amount can be shown in invoice
              example: true
            germanEnvironmentalGrant:
              description: A one-time reimbursement a consumer can apply for. If priceAlreadyDiscounted is true, then the price / monthly rate is already calculated including this discount. If priceAlreadyDiscounted is false, then the price / monthly rate does not take the grant into account, but can be lowered by applying this discount.

              allOf:
                - $ref: '#/components/schemas/Discount'

    Publication:
      required:
        - status
        - channels
      properties:
        status:
          description: the status of the publication
          allOf:
            - $ref: '#/components/schemas/PublicationStatus'
        channels:
          description: |
            A channel to publish the listing to; publishing to the channel <code>AS24</code> implicitly publishes to <code>AS24Dealer</code> channel. Publishing to the channel <code>mobile_de</code> marks listings as eligible for export to mobile.de if the customer has opted-in to selective mobile.de export handling. If a customer has not opted-in (which is the default) but has an export to mobile.de configured, then all listings will be exported.
          type: array
          items:
            $ref: '#/components/schemas/Channel'

    PublicationPayload:
      required:
        - status
        - channels
      properties:
        status:
          description: the status of the publication
          allOf:
            - $ref: '#/components/schemas/PublicationStatus'
        channels:
          description: a channel to publish the listing to.
          type: array
          items:
            $ref: '#/components/schemas/ChannelReference'

    PublicationStatus:
      description: |
        Indicates whether a listing is published or unpublished
      type: string
      enum: [ "Active", "Inactive" ]
      example: "Inactive"

    RetailPrice:
      allOf:
        - $ref: '#/components/schemas/Price'

    Reference:
      required:
        - id
        - name
        - referenceType
      properties:
        id:
          description: A unique identifier of this reference. This value is unique within its reference type
          type: string
          example: "1"
        name:
          description: the name of the given reference in English
          type: string
          example: Compact
        referenceType:
          description: The type of reference
          allOf:
            - $ref: '#/components/schemas/ReferenceType'
        vehicleType:
          type: array
          description: The vehicle types to which this reference applies.
          items:
            $ref: '#/components/schemas/VehicleTypeId'
        country:
          description: The countries to which this reference applies.
          type: array
          items:
            type: string
            description: |
              Each of the countries.
              Allowed values can be retrieved via the references API (reference type Country).
          example: [ "DE", "AT" ]

    References:
      properties:
        references:
          description: a set of references
          type: array
          items:
            $ref: '#/components/schemas/Reference'

    ReferenceType:
      description: the type of reference
      type: string
      enum:
        - "AvailabilityType"
        - "BatteryOwnershipType"
        - "BodyColor"
        - "BodyType"
        - "Co2Class"
        - "Country"
        - "DebitInterestType"
        - "Drivetrain"
        - "EfficiencyClass"
        - "Equipment"
        - "EuEmissionStandard"
        - "FuelCategory"
        - "FuelType"
        - "GermanEmissionsSticker"
        - "IncludedService"
        - "OfferType"
        - "PlugType"
        - "PriceLabel"
        - "Transmission"
        - "UpholsteryColor"
        - "UpholsteryType"
        - "VehicleType"
      example: BodyType

    Seal:
      required:
        - id
        - name
        - country
      properties:
        id:
          description: an identifier of the seal
          type: integer
          example: 10
        name:
          description: the name of given seal
          type: string
          example: Best Car Selection
        country:
          description: country for given seal (as ISO code)
          type: string
          example: NL-nl
        thumbnail:
          description: URL to the thumbnail image of the seal
          type: string
          example: "https://prod.pictures.autoscout24.net/seals/10.jpg"
        image:
          description: URL to the image of the seal
          type: string
          example: "https://prod.pictures.autoscout24.net/seals/10.jpg"
        info:
          description: URL to the information page of the seal
          type: string
          example: "https://www.autoscout24.nl/best-car-selection"
        manuallyEditable:
          description: Whether the seal can be manually edited by the dealer
          type: boolean
          example: false
        classId:
          description: The class of the seal
          type: integer
          example: 1
        defaultSet:
            description: Whether the seal is set by default
            type: boolean
            example: false

    Seals:
      properties:
        seals:
          description: a set of seals
          type: array
          items:
            $ref: '#/components/schemas/Seal'

