    VehicleTypeId:
      type: string
      enum: [ "C", "B", "N", "X", "L" ]
      description: |
        A type of vehicle.
        We currently support: <code>C</code> (cars), <code>B</code> (bikes), <code>X</code> (light commercial vehicle), <code>N</code> (caravan/mobile home), <code>L</code> (trailer)

        > Allowed values can be retrieved via the references API (reference type VehicleType)

      example: C

    VinEnrichmentStatus:
      description: |
        Indicates the status of enrichment
      type: string
      enum: [ "Processing", "Success", "Fail" ]
      example: "Success"

    WltpCommon:
      properties:
        co2EmissionsCombined:
          type: number
          minimum: 1
          maximum: 10000
          example: 85.4
          description: |
            The combined co2 emissions according to WLTP in g/km, one decimal place.
            
            > Only one decimal place is accepted. If more decimals are sent they will be truncated.

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car), <code>primaryFuelType</code> is either <code>12</code> (electric) and no <code>additionalFuelTypes</code> is set or <code>primaryFuelType</code> is not <code>12</code> (electric) and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
        co2EmissionsCombinedWeighted:
          type: number
          minimum: 1
          maximum: 10000
          example: 84.4
          description: |
            The weighted combined co2 emissions for plug-in-hybrids according to WLTP in g/km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car), primaryFuelType is <code>12</code> (electric) and <code>additionalFuelTypes</code> is not empty and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
        consumptionCombined:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 83.4
          description: |
            The combined consumption according to WLTP in l/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car), primaryFuelType is not <code>12</code> (electric) and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
        consumptionElectricCombined:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 82.4
          description: |
            The combined electric consumption according to WLTP in kWh/100km, one decimal place. For PHEVs this is the consumption when driving electric only.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car), primaryFuelType is <code>12</code> (electric) and no <code>additionalFuelTypes</code> and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
        consumptionCombinedWeighted:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 81.4
          description: |
            The combined consumption according to WLTP in l/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car), primaryFuelType is <code>12</code> (electric) and <code>additionalFuelTypes</code> is not empty and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
        consumptionElectricCombinedWeighted:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 80.4
          description: |
            The combined electric weighted consumption according to WLTP in kWh/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car), primaryFuelType is <code>12</code> (electric) and <code>additionalFuelTypes</code> is not empty and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
        co2Class:
          type: integer
          example: 10 (meaning A)
          description: |
            Vehicles co2 class.

            > Allowed values can be retrieved via the references API (reference type Co2Class)

            > Mandatory for German dealers when vehicleType is <code>C</code> and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)
            
            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
        co2ClassDischarged:
          type: integer
          example: 10 (meaning A)
          description: |
            Plug-In-Hybrid co2 class for discharged battery.

            > Allowed values can be retrieved via the references API (reference type Co2Class)

            > Mandatory for German dealers and plug in hybrids when vehicleType is <code>C</code> and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)
            
            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
        consumptionCombinedDischarged:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 80.4
          description: |
            The combined consumption for plug-in hybrids with empty battery according to WLTP in l/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.

            > Mandatory for German dealers when the vehicle type is <code>C</code> (Car), primaryFuelType is <code>12</code> (electric) and <code>additionalFuelTypes</code> is not empty and the car is considered new (<code>mileage</code> <= 1000 and <code>firstRegistrationDate</code> <= 8 months).

            > Forbidden for vehicleType <code>L</code> (trailer)

            > Forbidden if NEDC consumption values are set (<code>consumption</code>, <code>co2Emissions</code> or <code>efficiencyClass</code>)
        consumptionCity:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 7.2
          description: |
            The fuel consumption according to WLTP in l/100km, one decimal place.
            
            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for ICE and Mild/full Hybrids.
        consumptionCityDischarged:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 9.3
          description: |
            The fuel consumption in the city with discharged battery according to WLTP in l/100km, one decimal place.
            
            > Only one decimal place is accepted. If more decimals are sent they will be truncated.

            > Optional for PHEV.
        consumptionSuburban:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 5.1
          description: |
            The fuel consumption in suburban areas according to WLTP in l/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for ICE and Mild/full Hybrids.
        consumptionRural:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 4.2
          description: |
            The fuel consumption in rural areas according to WLTP in l/100km, one decimal place.
            
            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for ICE and Mild/full Hybrids.
        consumptionHighway:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 80.4
          description: |
            The fuel consumption on highways according to WLTP in l/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for ICE and Mild/full Hybrids.
        consumptionElectricCity:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 14.8
          description: |
            The electric consumption in the city according to WLTP in kWh/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for EV and PHEV.
        consumptionElectricSuburban:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 14.8
          description: |
            The electric consumption in suburban areas according to WLTP in kWh/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for EV and PHEV.
        consumptionElectricRural:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 14.8
          description: |
            The electric consumption in rural areas according to WLTP in kWh/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for EV and PHEV.
        consumptionElectricHighway:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 19.2
          description: |
            The electric consumption on highways according to WLTP in kWh/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for EV and PHEV.
        consumptionSuburbanDischarged:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 8.3
          description: |
            The fuel consumption in suburban areas with discharged battery according to WLTP in l/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for PHEV.
        consumptionRuralDischarged:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 8.4
          description: |
            The fuel consumption in rural areas with discharged battery according to WLTP in l/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for PHEV.
        consumptionHighwayDischarged:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 8.5
          description: |
            The fuel consumption on highways with discharged battery according to WLTP in l/100km, one decimal place.

            > Only one decimal place is accepted. If more decimals are sent they will be truncated.
            
            > Optional for PHEV.
        co2EmissionsDischarged:
          type: number
          minimum: 0.1
          maximum: 10000
          example: 116.2
          description: |
            The CO2 emissions with a discharged battery according to WLTP in g/km, one decimal place.
            
            > Optional for PHEV.

