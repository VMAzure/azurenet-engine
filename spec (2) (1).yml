openapi: "3.0.0"

info:
  title: Listing creation API
  version: v1
  contact:
    name: us
    email: daten@autoscout24.de
  description: |-
    API for creating listings that will be displayed on the AutoScout24 platform.

externalDocs:
  url: https://listing-creation.api.autoscout24.com/docs
  description: API documentation

servers:
  - url: https://listing-creation.api.autoscout24.com

security:
  - basicAuth: [ ]

paths:
  /customers:
    get:
      operationId: listCustomers
      summary: List all customers the user can operate on behalf of.
      responses:
        '200':
          description: |-
            The customers were correctly retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customers'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/ServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - customers

  /customers/{customerId}/listings:
    post:
      operationId: createListing
      summary: Creates a listing
      parameters:
        - in: path
          name: customerId
          schema:
            type: string
          required: true
          description: The ID of the customer whom the listings belong to
        - in: header
          name: X-Testmode
          schema:
            type: string
            format: boolean
          required: false
          description: |
            When set to true, the listing will be saved, but not published in the
            AutoScout24 platform. Also, the listing will only be available when
            the same header is set to true in the retrieve listing request.
        - in: header
          name: x-as24-lca-ng-api-listing-auto-completion-toggle
          schema:
            type: string
            format: boolean
          required: false
          description: |
            This header is optional and completely based on internal testing purposes.
            Never rely on this header in production as it may get removed anytime in the future..
        - in: header
          name: x-as24-lca-ng-api-pkw-en-vkv-amendment-enabled
          schema:
            type: string
            format: boolean
          required: false
          description: |
            This header is optional and completely based on internal testing purposes.
            Never rely on this header in production as it may get removed anytime in the future.
        - in: header
          name: x-as24-lca-ng-api-disable-setting-applied-seal
          schema:
            type: string
            format: boolean
          required: false
          description: |
            This header is optional and completely based on internal testing purposes.
            Never rely on this header in production as it may get removed anytime in the future.
        - in: header
          name: x-request-client-is-listing-form
          schema:
            type: string
            format: boolean
          required: false
          description: |
            This header is optional and completely based on internal testing purposes.
            Never rely on this header in production as it may get removed anytime in the future.
        - in: query
          name: culture
          schema:
            $ref: '#/components/schemas/ErrorCulture'
          required: false
          description: |
            Allow to localize the validation error messages to the language corresponding to the given culture.
            Defaults to en-GB.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingPayload'
            example:
              additionalFuelTypes:
                - 2
                - 3
              alloyWheelSize: 18
              availability:
