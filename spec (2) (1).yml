  /customers/{customerId}/listings/{listingId}:
    get:
      operationId: getListing
      summary: Gets a listing
      parameters:
        - in: path
          name: customerId
          schema:
            type: string
          required: true
          description: The ID of the customer whom the listings belong to
        - in: path
          name: listingId
          schema:
            type: string
            format: guid
          required: true
          description: The ID of the listing
        - in: query
          name: culture
          schema:
            $ref: '#/components/schemas/Culture'
          explode: false
          required: false
          description: |
            Allow to adjust the listing URL to the AutoScout24 website corresponding to the given culture.
        - in: header
          name: X-Testmode
          schema:
            type: string
            format: boolean
          required: false
          description: |
            When set to true, the listing will not found unless it was created as a test listing.
      responses:
