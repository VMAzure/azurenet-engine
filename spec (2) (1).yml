              crossReferenceId: DATX_002
              cylinderCapacity: 1998
              cylinderCount: 4
              description: 'This car is **great**. \ It has the following features: \ * Low price
                \ * Great interior
              '
              doorCount: 5
              drivetrain: R
              efficiencyClass: 2
              emptyWeight: 1200
              equipment:
                - 1
                - 2
                - 4
                - 15
              euEmissionStandard: '1'
              externalCustomerId: '1'
              firstRegistrationDate: 2015-01
              fuelCategory: B
              gearCount: 6
              germanEmissionsSticker: 1
              hasFullServiceHistory: false
              hasParticleFilter: true
              highlights:
                - fully equipped
