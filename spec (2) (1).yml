    Listing:
      allOf:
        - $ref: '#/components/schemas/ListingSharedAllSellers'
        - $ref: '#/components/schemas/ListingSharedDealerOnly'
        - type: object
          properties:
            offerType:
              type: string
              description: |
                Specifies the offer type of the vehicle.
                Allowed values can be retrieved via the references API (reference type OfferType)
              example: U
            prices:
              description: Provides price information for the vehicle.
              allOf:
                - $ref: '#/components/schemas/Prices'
            publication:
              description: Provides information about the publication status of the listing.
              allOf:
                - $ref: '#/components/schemas/Publication'
            twinner:
              description: Provides Twinner information for the vehicle.
              allOf:
                - $ref: '#/components/schemas/TwinnerPayload'



    ListingSharedDealerOnly:
      type: object
      properties:
        autoproff:
          description: |
            Provides autoproff-related data for the listing. Can not be set by data providers.
            
            > This attribute only applies for customers that are dealers.
          allOf:
            - $ref: '#/components/schemas/Autoproff'
        availability:
          description: |
            Provides information about when the vehicle is available.
            
            > This attribute only applies for customers that are dealers.
          allOf:
            - $ref: '#/components/schemas/Availability'
        financingOffer:
          description: |
            Provides information about the financing offer of the listing
            
            > This attribute only applies for customers that are dealers.
          allOf:
            - $ref: '#/components/schemas/FinancingOffer'
        highlights:
          type: array
          maxItems: 3
          description: |
            Short notes highlighting key features of the vehicle
            
            <strong>🚧 This functionality is currently under construction and will not be shown to Autoscout24 users</strong>
            
            > This attribute only applies for customers that are dealers.
          items:
            $ref: '#/components/schemas/Highlight'
        warranty:
          type: integer
          minimum: 0
          maximum: 999
          description: |
            Specifies the length in months of an additional warranty that is offered by the dealer.
            This warranty must be included in the vehicle price.
            If this field is not set, no warranty is provided
            
            > This attribute only applies for customers that are dealers.
          example: 12
        warrantyUnit:
          type: string
          description: |
            Unit used for warranty field.
            
            > This attribute only applies for customers that are dealers.
          example: Months
        hasWarranty:
          type: boolean
          description: |
            Whether the vehicle has warranty.
            If warranty is set to 0 this can't be set to 'true'
            If warranty is set to > 0 this can't be set to 'false'
            
            > This attribute only applies for customers that are dealers.
          example: true
        marketing:
          description: |
            Provides additional marketing information
            
            > This attribute only applies for customers that are dealers.
          allOf:
            - $ref: '#/components/schemas/Marketing'
        appliedSeals:
          description: |
            List of applied car seals shown on the listing.
            Sometimes additional seals are added or removed automatically, irrespective of the seals set using the <code>requestedSeals</code> property
            Note: this attribute is set for informational purposes as part of our read-only endpoints.
            Please use <code>requestedSeals</code> if you want to submit seals instead.
            
            > This attribute only applies for customers that are dealers.
          type: array
          example: [ 1, 2, 3 ]
          uniqueItems: true
          items:
            type: integer
        leasingOffers:
          description: |
            Allows a dealer to offer leasing when selling the vehicle.
            
            > Not available for dealers outside germany. This attribute only applies for customers that are dealers.
          allOf:
            - $ref: '#/components/schemas/LeasingOffers'
        overwriteProtection:
          description: |
            When overwriteProtection is true, it’s not possible to edit or delete the listing using the API.
            Changes or deletions are only possible on the listing using the dealers My Area on the website.
            The dealer can also deactivate this option through My Area.
            A missing value is equivalent to false.
            
            > This attribute only applies for customers that are dealers.
          type: boolean
          example: false
        onlineSale:
          description: |
            Provides information about the online sale of the listing.
            
            > This attribute only applies for customers that are dealers.
          allOf:
            - $ref: '#/components/schemas/OnlineSale'

